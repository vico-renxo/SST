<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HCCB</title>
  <style>
    .obs-card-sub {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      background: #fafafa;
    }
    .obs-card-sub.pendiente { border-left: 4px solid #ff9800; }
    .obs-card-sub.subsanada { border-left: 4px solid #28a745; }
    .obs-card-sub.en-gestion { border-left: 4px solid #6c757d; }
    .obs-section-title {
      background-color: #2c5aa0;
      color: #fff;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 4px 4px 0 0;
      font-size: 0.85em;
      margin: 0 -10px;
      margin-top: -10px;
      margin-bottom: 6px;
    }
    .obs-item-no {
      font-size: 0.82em;
      color: #dc3545;
      padding: 1px 0;
    }
    .obs-comment-sub {
      font-size: 0.82em;
      color: #555;
      margin: 4px 0;
      padding: 3px 6px;
      background: #fff8e1;
      border-radius: 3px;
    }
    .obs-photos-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .obs-photo-box {
      width: 64px;
      height: 64px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #ccc;
    }
    .obs-photo-label {
      font-size: 0.72em;
      color: #888;
      margin-bottom: 2px;
    }
    .sub-cam-label {
      cursor: pointer;
      font-size: 0.85em;
      color: #2c5aa0;
    }
    .sub-cam-label:hover { color: #ff9800; }
    .sub-thumb-wrapper {
      position: relative;
      display: inline-block;
    }
    .sub-thumb-wrapper > div {
      width: 48px;
      height: 48px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .sub-thumb-remove {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #e53935;
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .sub-thumb-label {
      position: absolute;
      top: -3px;
      left: -3px;
      background: #28a745;
      color: #fff;
      border-radius: 50%;
      width: 15px;
      height: 15px;
      font-size: 8px;
      line-height: 15px;
      text-align: center;
      font-weight: bold;
    }
    .header-compact label {
      font-size: 0.78em;
      color: #888;
      margin-bottom: 0;
    }
    .header-compact .form-control {
      font-size: 0.88em;
      padding: 3px 8px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container text-center mt-5" id="ploading">
    <div class="h3">Cargando...</div>
  </div>

  <div class="container print-container" id="pForm" style="background-color: #fcfcfc;">
    <div>

      <!-- ✅ ENCABEZADO -->
      <div class="d-flex align-items-center mb-2 mt-2">
        <div class="bg-warning rounded-circle d-flex align-items-center justify-content-center me-2" style="width:34px; height:34px;">
          <i class="fa-solid fa-screwdriver-wrench text-white" style="font-size:14px;"></i>
        </div>
        <div>
          <h6 class="mb-0" style="color:#2c5aa0;">Subsanación de Observaciones</h6>
        </div>
      </div>

      <!-- ✅ DATOS GENERALES (readonly compacto) -->
      <div class="row header-compact">
        <div class="col-6 mb-1">
          <label class="form-label">Id CheckList</label>
          <input type="text" class="form-control" id="numid" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Empresa</label>
          <input type="text" class="form-control" id="empresacheck" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Equipo</label>
          <input type="text" class="form-control" id="name" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">ID/Código</label>
          <input type="text" class="form-control" id="codigo" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Área</label>
          <input type="text" class="form-control" id="inps" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Proceso</label>
          <input type="text" class="form-control" id="procesoCheck" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Supervisor de Operaciones</label>
          <input type="text" class="form-control" id="no" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Lugar</label>
          <input type="text" class="form-control" id="lugarCheck" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Responsable de Área</label>
          <input type="text" class="form-control" id="responsableCheck" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Fecha</label>
          <input type="text" class="form-control" id="idline" readonly>
        </div>
        <div class="col-6 mb-1">
          <label class="form-label">Frecuencia</label>
          <input type="text" class="form-control" id="plazoCheck" readonly>
        </div>
      </div>

      <!-- ✅ CUMPLIMIENTO (readonly) -->
      <div class="mt-2 mb-1">
        <label class="form-label" style="font-size:0.85em;"><b>Cumplimiento</b></label>
        <input type="text" class="form-control visually-hidden" id="check" readonly>
        <div>
          <i class="fa-solid fa-check text-success" style="font-size: 22px;"></i> <span id="count-si">0</span>&nbsp; 
          <i class="fa-solid fa-xmark text-danger" style="font-size: 22px;"></i> <span id="count-no">0</span> &nbsp;
          <i class="fa-regular fa-circle text-primary" style="font-size: 18px;"></i> <span id="count-otros">0</span>
        </div> 
      </div>

      <!-- ✅ ESTADO AUTOMÁTICO + CONTADOR -->
      <div class="d-flex justify-content-between align-items-center mb-2 p-2" style="background:#f0f4f8; border-radius:6px;">
        <div>
          <span style="font-size:0.82em; color:#555;">Estado:</span>
          <span id="estadoAutoCheck" style="font-weight:bold;"></span>
        </div>
        <div>
          <span style="font-size:0.82em; color:#555;">Subsanadas:</span>
          <span id="contadorSubsanacion" style="font-weight:bold;">0 de 0</span>
        </div>
      </div>

      <!-- ✅ ITEMS OBSERVADOS (unificado: título + ítems No + comentario + fotos + subsanación) -->
      <div class="mb-2">
        <div class="d-flex align-items-center mb-1">
          <i class="fa-solid fa-clipboard-list me-1" style="color:#ff9800;"></i>
          <b style="font-size:0.9em; color:#333;">Items observados</b>
        </div>
        <div id="items-observados-container"></div>
      </div>

      <!-- ✅ PLAN DE ACCIÓN (readonly) -->
      <div class="mb-1">
        <label class="form-label" style="font-size:0.85em;"><b>Plan de acción</b></label>
        <textarea class="form-control" id="accion" readonly style="font-size:0.88em; height:50px;"></textarea>
      </div>

      <!-- ✅ IMAGEN GENERAL (referencia) -->
      <div class="mb-1">
        <label class="form-label" style="font-size:0.85em;"><b>Imagen de referencia</b></label>
        <input type="text" class="form-control visually-hidden" id="imagen" readonly>
        <div class="text-center">
          <img id="imagen-preview" src="" alt="Imagen" style="max-width: 100%; max-height: 120px; display: none; border-radius:6px; cursor:pointer;" onclick="showImageCheckList(this.src)">
        </div>
      </div>

      <!-- ✅ BOTONES -->
      <div class="text-center mt-3 mb-3">
        <button type="button" class="btn btn-primary" id="btnGuardarSub" onclick="guardarSubsanacion()">
          <i class="fa-solid fa-cloud-arrow-up me-1"></i>Guardar
        </button>
        <button class="btn btn-warning" id="imprimir" onclick="window.print()" style="font-size:15px;">🖨️</button>
        <button class="btn btn-success" id="btnWhatsApp"><i class="fa-brands fa-whatsapp"></i></button>
        <button class="btn btn-danger" id="exportPdf" onclick="exportToPDF()">PDF</button>
      </div>

    </div>
  </div>

  <script>
  // =============================================
  // VARIABLES GLOBALES
  // =============================================
  var subsanacionPhotos = {};
  var gestionItems = {}; // cambios pendientes de En Gestión: {"sIdx-itemNum": true/false}
  let dataSet;
  let itemsData = [];

  // =============================================
  // HELPER: Parsear celda codificada "num::value~~num::value"
  // Compatible con formato antiguo (URL sin '::')
  // =============================================
  function parseObsCellEdit(cellValue) {
    if (!cellValue) return [];
    var s = String(cellValue).trim();
    if (!s) return [];
    if (!s.includes('::')) return [{ num: '', value: s }];
    return s.split('~~').filter(Boolean).map(function(part) {
      var si = part.indexOf('::');
      if (si === -1) return { num: '', value: part };
      return { num: part.substring(0, si), value: part.substring(si + 2) };
    });
  }

  // =============================================
  // INIT
  // =============================================
  document.addEventListener('DOMContentLoaded', () => {
    google.script.run.withSuccessHandler(data => {
      dataSet = data;
      document.getElementById('pForm').style.display = "block";
      document.getElementById('ploading').style.display = "none";
    }).getData2();
    
    google.script.run.withSuccessHandler(data => {
      itemsData = data;
    }).getItemsData();
  });

  // =============================================
  // CUMPLIMIENTO (solo contadores, sin renderizar lista)
  // =============================================
  function updateComplianceCounts(equipo, compliance) {
    const compList = compliance.split(',').map(c => c.trim());
    const items = itemsData.filter(r => r[1] === equipo);

    let siCount = 0, noCount = 0, otrosCount = 0;

    compList.forEach((valor, i) => {
      const item = items[i] ? items[i][2] : null;
      if (!item) return;
      const esTitulo = /^\d+\./.test(item.trim()) && valor === 'NA';
      if (esTitulo) return;

      if (valor === 'Si') siCount++;
      else if (valor === 'No') noCount++;
      else otrosCount++;
    });

    document.getElementById('count-si').innerText = siCount;
    document.getElementById('count-no').innerText = noCount;
    document.getElementById('count-otros').innerText = otrosCount;
  }

  // ── Helper: detectar si el usuario actual es administrador ──────────
  function _esAdmin() {
    try {
      var ud = JSON.parse(localStorage.getItem('userName') || '{}');
      var cargo = String(ud.cargo || '').toLowerCase();
      return cargo.includes('administrador') || cargo.includes('admin');
    } catch(e) { return false; }
  }

  // ── Helper: detectar si el usuario puede usar el botón "En Gestión"
  // (admin, supervisor de operaciones, empleado — NO operario/obrero) ────
  function _puedeGestionar() {
    try {
      var ud = JSON.parse(localStorage.getItem('userName') || '{}');
      var cargo = String(ud.cargo || '').toLowerCase();
      return cargo.includes('administrador') || cargo.includes('admin') ||
             cargo.includes('supervisor') || cargo.includes('empleado');
    } catch(e) { return false; }
  }

  // ── Acción: marcar/desmarcar EN_GESTION localmente (se confirma al presionar Guardar) ──
  function toggleGestionResponsable(checkId, sIdx, itemNum, habilitar) {
    var key = String(sIdx) + '-' + String(itemNum);
    gestionItems[key] = habilitar;

    if (window.currentCheckData) {
      // Preservar fotos staged antes de re-renderizar (populateSubsanacion resetea subsanacionPhotos)
      var savedPhotos = JSON.parse(JSON.stringify(subsanacionPhotos));
      populateSubsanacion(window.currentCheckData, window.currentCheckData[2]);
      subsanacionPhotos = savedPhotos;
      // Re-dibujar thumbnails que ya estaban cargados
      Object.keys(savedPhotos).forEach(function(k) {
        var parts = k.split('-');
        renderSubsanacionThumbs(parseInt(parts[0]), parts.slice(1).join('-'));
      });
    }

    Swal.fire({ toast: true, position: 'top-end', icon: 'info',
      title: habilitar ? '"En Gestión" marcado — presiona Guardar para confirmar' : 'Restablecido — presiona Guardar para confirmar',
      showConfirmButton: false, timer: 2500 });
  }

  // =============================================
  // POBLAR ITEMS OBSERVADOS (unificado)
  // Título azul → ítems "No" → comentario → fotos → upload
  // =============================================
  function populateSubsanacion(fila, equipo) {
    const container = document.getElementById('items-observados-container');
    if (!container) return;

    const esAdmin = _esAdmin();
    const puedeGestionar = _puedeGestionar();
    const checkId = fila[0];

    const compList = fila[14].split(',').map(c => c.trim());
    const items = itemsData.filter(r => r[1] === equipo);

    // ── Paso 1: Agrupar ítems por sección ──
    let sections = [];
    let currentSection = null;
    let itemCounter = 0;

    compList.forEach((valor, i) => {
      const itemText = items[i] ? String(items[i][2]).trim() : '';
      const esTitulo = /^\d+\./.test(itemText) && valor === 'NA';

      if (esTitulo) {
        if (currentSection) sections.push({ ...currentSection });
        currentSection = {
          title: itemText,
          index: sections.length,
          noItems: []
        };
      } else {
        itemCounter++;
        if (valor === 'No' && currentSection) {
          currentSection.noItems.push({ num: itemCounter, text: itemText });
        }
      }
    });
    if (currentSection) sections.push({ ...currentSection });

    // ── Paso 2: Generar HTML solo para secciones con observación ──
    let html = '';
    let totalObs = 0;
    let totalSubsanadas = 0;
    subsanacionPhotos = {};

    sections.forEach((sec, sIdx) => {
      const fotoIdx = 68 + sIdx * 3;
      const subIdx  = 69 + sIdx * 3;
      const comIdx  = 70 + sIdx * 3;

      const fotoRaw       = (fila[fotoIdx] || '').trim();
      const subsanacionRaw = (fila[subIdx] || '').trim();
      const comentarioRaw  = (fila[comIdx] || '').trim();

      // Solo mostrar secciones que tienen observación
      if (!fotoRaw && !comentarioRaw) return;

      // Parsear celdas codificadas (nuevo: "num::url~~" | antiguo: URL directa)
      const fotoItems    = parseObsCellEdit(fotoRaw);
      const subItems     = parseObsCellEdit(subsanacionRaw);
      const comentItems  = parseObsCellEdit(comentarioRaw);

      const subByNum     = {};
      subItems.forEach(i => { subByNum[i.num] = i.value; });
      // Aplicar overrides locales (gestionItems staged, pendientes de Guardar)
      const gKeyPrefix = String(sIdx) + '-';
      Object.keys(gestionItems).forEach(gKey => {
        if (gKey.startsWith(gKeyPrefix)) {
          const itemNum = gKey.slice(gKeyPrefix.length);
          if (gestionItems[gKey] === true) {
            subByNum[itemNum] = 'EN_GESTION';
          } else if (gestionItems[gKey] === false && subByNum[itemNum] === 'EN_GESTION') {
            delete subByNum[itemNum];
          }
        }
      });
      const comentByNum  = {};
      comentItems.forEach(i => { comentByNum[i.num] = i.value; });

      // Conteo a nivel de ítem
      const obsItemsWithFoto = fotoItems.filter(i => i.value);
      const obsGR            = obsItemsWithFoto.filter(i => subByNum[i.num] === 'EN_GESTION').length;
      const obsSubsanadasReal = obsItemsWithFoto.filter(i => subByNum[i.num] && subByNum[i.num] !== 'EN_GESTION').length;
      const obsSubsanadas    = obsSubsanadasReal + obsGR;
      totalObs         += obsItemsWithFoto.length;
      totalSubsanadas  += obsSubsanadas;

      const esSubsanada  = obsItemsWithFoto.length > 0 && obsSubsanadasReal >= obsItemsWithFoto.length;
      const esEnGestion  = !esSubsanada && obsItemsWithFoto.length > 0 && obsSubsanadas >= obsItemsWithFoto.length && obsGR > 0;

      const claseCard = esSubsanada ? 'subsanada' : (esEnGestion ? 'en-gestion' : 'pendiente');

      html += `
      <div class="obs-card-sub ${claseCard}">
        <div class="obs-section-title">
          <i class="fa-solid fa-list-check me-1"></i>${sec.title}
          ${esSubsanada
            ? '<span class="badge bg-success ms-2" style="font-size:0.7em;">✓ Subsanada</span>'
            : esEnGestion
              ? '<span class="badge ms-2" style="font-size:0.7em; background:#6c757d; color:#fff;"><i class="fa-solid fa-clock-rotate-left me-1"></i>En Gestión del Responsable</span>'
              : '<span class="badge bg-warning text-dark ms-2" style="font-size:0.7em;">Pendiente</span>'}
        </div>`;

      // ✅ Por ítem observado: foto original + comentario + cámara de subsanación + thumbs
      // Usamos los ítems de la celda foto_obs (incluye solo los que tienen foto)
      // También mostramos ítems de comentario sin foto
      const itemNums = new Set([
        ...fotoItems.filter(i => i.value).map(i => i.num),
        ...comentItems.filter(i => i.value).map(i => i.num)
      ]);

      itemNums.forEach(num => {
        const fotoUrl    = (fotoItems.find(i => i.num === num) || {}).value || '';
        const subUrl     = subByNum[num] || '';
        const comentario = comentByNum[num] || '';
        const key        = sIdx + '-' + (num || '0');

        // Buscar texto del ítem en sec.noItems (puede no encontrarse si num está en lista)
        const itemInfo   = sec.noItems.find(ni => String(ni.num) === String(num));
        const shortText  = itemInfo
          ? (itemInfo.text.length > 30 ? itemInfo.text.substring(0, 30) + '…' : itemInfo.text)
          : '';

        const esGR = (subUrl === 'EN_GESTION');
        const borderColor = esGR ? '#6c757d' : (subUrl ? '#28a745' : '#ff9800');
        html += `<div style="margin:5px 0; padding:5px; background:#f8f8f8; border-radius:4px; border-left:3px solid ${borderColor};">`;

        // Encabezado ítem
        if (num || shortText) {
          html += `<div style="display:flex; align-items:center; gap:4px; margin-bottom:3px;">
            <span style="font-size:0.78em; color:#dc3545; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              ❌ <b>${num ? num + '.' : ''}</b> ${shortText}
            </span>`;
          if (!subUrl && !esGR) {
            html += `<label for="sub-photo-${key}" class="sub-cam-label" style="flex-shrink:0;" title="Agregar foto subsanación ítem ${num}">
              <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="sub-photo-${key}" accept="image/*" capture="environment" style="display:none;" onchange="addSubsanacionPhoto(${sIdx},'${num}',event)">`;
            if (puedeGestionar) {
              html += `<button id="btn-gr-${sIdx}-${num}" type="button"
                onclick="toggleGestionResponsable('${checkId}',${sIdx},'${num}',true)"
                title="Marcar como En Gestión"
                style="flex-shrink:0; font-size:0.68em; padding:2px 5px; border:none; border-radius:3px; background:#6c757d; color:#fff; cursor:pointer; white-space:nowrap;">
                <i class="fa-solid fa-clock-rotate-left"></i> En Gestión
              </button>`;
            }
          } else if (esGR && puedeGestionar) {
            html += `<button id="btn-gr-${sIdx}-${num}" type="button"
              onclick="toggleGestionResponsable('${checkId}',${sIdx},'${num}',false)"
              title="Restablecer estado"
              style="flex-shrink:0; font-size:0.68em; padding:2px 5px; border:none; border-radius:3px; background:#dc3545; color:#fff; cursor:pointer; white-space:nowrap;">
              <i class="fa-solid fa-rotate-left"></i> Restablecer
            </button>`;
          }
          html += `</div>`;
        }

        // Comentario de la observación
        if (comentario) {
          html += `<div class="obs-comment-sub"><i class="fa-regular fa-comment me-1"></i>${comentario}</div>`;
        }

        // Fotos: original + subsanación / EN_GESTION badge
        html += `<div class="obs-photos-row" style="margin-top:4px;">`;
        if (fotoUrl) {
          html += `<div>
            <div class="obs-photo-label">Foto original:</div>
            <div class="obs-photo-box" onclick='showImageCheckList("${fotoUrl}")'
                 style="background-image:url(${fotoUrl});" title="Tap para ampliar"></div>
          </div>`;
        }
        if (esGR) {
          html += `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center;
            width:64px; height:64px; background:#e9ecef; border-radius:4px;
            border:2px solid #6c757d; text-align:center; padding:3px;">
            <i class="fa-solid fa-clock-rotate-left" style="font-size:16px; color:#6c757d; margin-bottom:3px;"></i>
            <span style="font-size:0.55em; color:#495057; line-height:1.2;">En Gestión del Responsable</span>
          </div>`;
        } else if (subUrl) {
          html += `<div>
            <div class="obs-photo-label">Subsanación:</div>
            <div class="obs-photo-box" onclick='showImageCheckList("${subUrl}")'
                 style="background-image:url(${subUrl}); border:2px solid #28a745;" title="Tap para ampliar"></div>
          </div>`;
        }
        // Thumbnails de fotos nuevas de subsanación
        html += `</div>
        <div id="sub-thumbs-${key}" style="display:flex; gap:4px; flex-wrap:wrap; margin-top:3px;"></div>`;
        html += `</div>`;
      });

      // Si la sección tiene ítems "No" en el checklist que no tienen foto/comentario aún,
      // mostrarlos como pendientes de subsanación solo si hay foto_obs en la sección
      if (fotoRaw || comentarioRaw) {
        sec.noItems.forEach(item => {
          if (!itemNums.has(String(item.num)) && !itemNums.has('')) {
            const key  = sIdx + '-' + item.num;
            const subUrl = subByNum[String(item.num)] || '';
            const shortText = item.text.length > 30 ? item.text.substring(0, 30) + '…' : item.text;
            if (!subUrl) {
              html += `<div style="display:flex; align-items:center; gap:4px; margin:2px 0;">
                <span style="font-size:0.75em; color:#888; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                  <b>${item.num}.</b> ${shortText}
                </span>
              </div>`;
            }
          }
        });
      }

      html += `</div>`;
    });

    if (totalObs === 0) {
      html = '<div class="text-muted text-center py-3"><i class="fa-solid fa-check-circle text-success me-2"></i>Sin observaciones registradas</div>';
    }

    container.innerHTML = html;

    // ── Paso 3: Actualizar estado y contador ──
    const estadoEl = document.getElementById('estadoAutoCheck');
    const contadorEl = document.getElementById('contadorSubsanacion');

    if (estadoEl) {
      let estado = 'Conforme';
      if (totalObs > 0 && totalSubsanadas === 0) estado = 'Abierto';
      else if (totalObs > 0 && totalSubsanadas < totalObs) estado = 'En Proceso';
      else if (totalObs > 0 && totalSubsanadas >= totalObs) estado = 'Cerrado';

      const colores = { 'Conforme': '#ffc107', 'Abierto': '#dc3545', 'En Proceso': '#fd7e14', 'Cerrado': '#28a745' };
      estadoEl.innerHTML = `<span style="color:${colores[estado]};">${estado}</span>`;
    }

    if (contadorEl) {
      contadorEl.textContent = `${totalSubsanadas} de ${totalObs}`;
    }
  }

  // =============================================
  // FOTOS SUBSANACIÓN: Agregar con ITEM + timestamp
  // =============================================
  function addSubsanacionPhoto(sectionIdx, itemNum, event) {
    var file = event.target.files[0];
    if (!file) return;
    var key = sectionIdx + '-' + itemNum;

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxW = 800;
        var scale = img.width > maxW ? maxW / img.width : 1;
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        var now = new Date();
        var stamp = String(now.getDate()).padStart(2, '0') + '/' +
                    String(now.getMonth() + 1).padStart(2, '0') + '/' +
                    now.getFullYear() + '  ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0') + ':' +
                    String(now.getSeconds()).padStart(2, '0');

        var fontSize = Math.max(14, Math.floor(canvas.width * 0.035));
        ctx.font = 'bold ' + fontSize + 'px Arial';

        // ✅ ITEM label + ✓ esquina superior izquierda
        var itemLabel = 'ITEM ' + itemNum + ' ✓';
        var labelW = ctx.measureText(itemLabel).width;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(4, 4, labelW + 14, fontSize + 10);
        ctx.fillStyle = '#00FF7F';
        ctx.fillText(itemLabel, 11, fontSize + 7);

        // ✅ Fecha/hora esquina inferior derecha
        var textW = ctx.measureText(stamp).width;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(canvas.width - textW - 18, canvas.height - fontSize - 14, textW + 14, fontSize + 10);
        ctx.fillStyle = '#FFD700';
        ctx.fillText(stamp, canvas.width - textW - 11, canvas.height - 11);

        var stampedBase64 = canvas.toDataURL('image/jpeg', 0.8);

        if (!subsanacionPhotos[key]) subsanacionPhotos[key] = [];
        subsanacionPhotos[key].push(stampedBase64);
        renderSubsanacionThumbs(sectionIdx, itemNum);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  // =============================================
  // FOTOS SUBSANACIÓN: Eliminar
  // =============================================
  function removeSubsanacionPhoto(sectionIdx, itemNum, photoIdx) {
    var key = sectionIdx + '-' + itemNum;
    if (subsanacionPhotos[key]) {
      subsanacionPhotos[key].splice(photoIdx, 1);
      renderSubsanacionThumbs(sectionIdx, itemNum);
    }
  }

  // =============================================
  // FOTOS SUBSANACIÓN: Renderizar thumbnails por ítem
  // =============================================
  function renderSubsanacionThumbs(sectionIdx, itemNum) {
    var key = sectionIdx + '-' + itemNum;
    var container = document.getElementById('sub-thumbs-' + key);
    if (!container) return;
    container.innerHTML = '';
    var photos = subsanacionPhotos[key] || [];
    photos.forEach(function(b64, idx) {
      var div = document.createElement('div');
      div.className = 'sub-thumb-wrapper';
      div.innerHTML = '<div style="background-image:url(' + b64 + ');"></div>' +
        '<span class="sub-thumb-label">' + itemNum + '</span>' +
        '<button class="sub-thumb-remove" onclick="removeSubsanacionPhoto(' + sectionIdx + ',' + itemNum + ',' + idx + ')">✕</button>';
      container.appendChild(div);
    });
  }

  // =============================================
  // FOTOS SUBSANACIÓN: Collage canvas (array de b64)
  // =============================================
  function buildSubsanacionCollage(photosArray) {
    return new Promise(function(resolve) {
      if (photosArray.length === 0) { resolve(''); return; }
      if (photosArray.length === 1) { resolve(photosArray[0]); return; }

      var images = [];
      var loaded = 0;
      photosArray.forEach(function(b64, i) {
        var img = new Image();
        img.onload = function() {
          images[i] = img;
          loaded++;
          if (loaded === photosArray.length) {
            var cols = 2;
            var rows = Math.ceil(photosArray.length / cols);
            var cellW = 400, cellH = 300;
            var canvas = document.createElement('canvas');
            canvas.width = cellW * cols;
            canvas.height = cellH * rows;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            images.forEach(function(im, idx) {
              var col = idx % cols;
              var row = Math.floor(idx / cols);
              var x = col * cellW, y = row * cellH;
              var sc = Math.min(cellW / im.width, cellH / im.height);
              var w = im.width * sc, h = im.height * sc;
              ctx.drawImage(im, x + (cellW - w) / 2, y + (cellH - h) / 2, w, h);
              ctx.strokeStyle = '#ddd';
              ctx.lineWidth = 2;
              ctx.strokeRect(x, y, cellW, cellH);
            });
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          }
        };
        img.src = b64;
      });
    });
  }

  // =============================================
  // GUARDAR SUBSANACIÓN
  // =============================================
  async function guardarSubsanacion() {
    const btn = document.getElementById('btnGuardarSub');
    btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin me-1'></i>Guardando...";
    btn.disabled = true;

    const checkId = document.getElementById('numid').value;

    if (!checkId) {
      Swal.fire('Error', 'No se encontró el ID del check', 'error');
      btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
      btn.disabled = false;
      return;
    }

    // Verificar que haya al menos una foto nueva
    const hayFotosNuevas = Object.keys(subsanacionPhotos).some(k => subsanacionPhotos[k].length > 0);
    const hayGestionPendiente = Object.keys(gestionItems).length > 0;

    if (!hayFotosNuevas && !hayGestionPendiente) {
      Swal.fire('Aviso', 'No hay cambios pendientes para guardar.\nSube una foto de subsanación o marca ítems como "En Gestión".', 'warning');
      btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
      btn.disabled = false;
      return;
    }

    Swal.fire({
      title: 'Guardando...',
      text: 'Por favor espera.',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    // ── 1. Guardar ítems "En Gestión" pendientes ──────────────────────────
    if (hayGestionPendiente) {
      const gKeys = Object.keys(gestionItems);
      try {
        for (const gKey of gKeys) {
          const parts  = gKey.split('-');
          const gSIdx  = parseInt(parts[0]);
          const gINum  = parts.slice(1).join('-');
          await new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(function(r) { r && r.success === false ? reject(new Error(r.error || 'Error al guardar')) : resolve(r); })
              .withFailureHandler(reject)
              .setGestionResponsable({ checkId: checkId, sIdx: gSIdx, itemNum: gINum, habilitar: gestionItems[gKey] });
          });
        }
        gestionItems = {};
      } catch (e) {
        Swal.fire('Error', 'Error al guardar En Gestión: ' + (e.message || e), 'error');
        btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
        btn.disabled = false;
        return;
      }
    }

    // ── 2. Si no hay fotos nuevas, recargar panel + tabla principal ──────────
    if (!hayFotosNuevas) {
      Swal.fire({ icon: 'success', title: 'Guardado correctamente', timer: 2000, showConfirmButton: false })
        .then(() => {
          // Recargar datos del panel de subsanación
          google.script.run.withSuccessHandler(function(rows) {
            if (rows && rows.data && rows.data.length > 0) {
              window.currentCheckData = rows.data[0];
              populateSubsanacion(rows.data[0], rows.data[0][2]);
            }
          }).getDatosRegistroCheck(0, 1, String(checkId), '', 'A', 'todos');

          // Refrescar tabla principal (IndexCheck) para que muestre el estado actualizado
          if (typeof reiniciarTablaCheck === 'function') {
            reiniciarTablaCheck();
          }

          // Actualizar contadores de estado en el header
          var totalCheck1 = document.getElementById('totalCheck1');
          var totalCheck2 = document.getElementById('totalCheck2');
          if (totalCheck1 && totalCheck2) {
            google.script.run.withSuccessHandler(function(data) {
              totalCheck1.innerHTML = data[0];
              totalCheck2.innerHTML = data[1];
            }).setStatusCheck();
          }
        });
      btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
      btn.disabled = false;
      return;
    }

    // ── 3. Guardar fotos de subsanación ───────────────────────────────────
    let objData = { checkId: checkId };

    for (let s = 0; s < 10; s++) {
      var items = [];
      for (var key in subsanacionPhotos) {
        if (key.startsWith(s + '-') && subsanacionPhotos[key].length > 0) {
          var parts   = key.split('-');
          var itemNum = parts.slice(1).join('-');
          var photos  = subsanacionPhotos[key];
          var collage = await buildSubsanacionCollage(photos);
          items.push({ num: itemNum, b64: collage });
        }
      }
      if (items.length > 0) {
        objData['subsanacion-' + s] = JSON.stringify(items);
      }
    }

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          Swal.fire({
            icon: 'success',
            title: 'Subsanación guardada',
            html: 'Estado: <b>' + result.estado + '</b>',
            timer: 2500,
            showConfirmButton: true,
            confirmButtonText: 'Cerrar'
          }).then(() => {
            var modal = document.querySelector('#staticBackdrop');
            if (modal) {
              var modalInstance = bootstrap.Modal.getInstance(modal);
              if (modalInstance) modalInstance.hide();
            }
            if (typeof reiniciarTablaCheck === 'function') {
              reiniciarTablaCheck();
            }
          });

          let totalCheck1 = document.getElementById('totalCheck1');
          let totalCheck2 = document.getElementById('totalCheck2');
          if (totalCheck1 && totalCheck2) {
            google.script.run.withSuccessHandler(function(data) {
              totalCheck1.innerHTML = data[0];
              totalCheck2.innerHTML = data[1];
            }).setStatusCheck();
          }
        } else {
          Swal.fire('Error', result.error || 'Error al guardar', 'error');
        }
        btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
        btn.disabled = false;
      })
      .withFailureHandler(function(error) {
        Swal.fire('Error', error.message || 'Error de conexión', 'error');
        btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up me-1'></i>Guardar";
        btn.disabled = false;
      })
      .saveDataCheckSeguimiento(objData);
  }

  // =============================================
  // EXPORTAR PDF (sin cambios)
  // =============================================
  function exportToPDF() {
    let numid = document.getElementById('numid').value;

    if (numid === "") {
      Swal.fire({
        position: 'center',
        icon: 'error',
        title: 'Por favor, ingrese un ID en el campo correspondiente',
        showConfirmButton: false,
        timer: 2500
      });
      return;
    }

    Swal.fire({
      title: 'Generando PDF',
      text: 'Por favor, espere...',
      allowOutsideClick: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    google.script.run.withSuccessHandler(function(response) {
      Swal.close();

      if (response.pdflink) {
        Swal.fire({
          position: 'center',
          icon: 'success',
          title: 'PDF generado exitosamente',
          showConfirmButton: true,
          confirmButtonText: 'Abrir PDF'
        }).then((result) => {
          if (result.isConfirmed) {
            window.open(response.pdflink, '_blank');
          }
        });
      } else {
        Swal.fire({
          position: 'center',
          icon: 'error',
          title: 'Error al generar el PDF',
          showConfirmButton: false,
          timer: 2500
        });
      }
    }).generarPDF(numid);
  }

  // =============================================
  // WHATSAPP (sin cambios)
  // =============================================
  function sendWhatsApp(message) {
    Swal.fire({
      title: 'Opciones de envío',
      text: '¿Deseas ingresar un número o enviar a contactos?',
      showDenyButton: true,
      showCancelButton: true,
      confirmButtonText: 'Ingresar número',
      denyButtonText: 'Mis contactos'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: 'Número de teléfono',
          input: 'text',
          inputLabel: 'Ingrese el N° de teléfono a quien se enviará',
          inputPlaceholder: 'e.g. 944222222',
          showCancelButton: true,
          inputValidator: (value) => {
            if (!value) {
              return '¡Debe ingresar un número de teléfono!';
            }
          },
          inputAttributes: {
            maxlength: 10,
            autocapitalize: 'off',
            autocorrect: 'off'
          },
          didOpen: () => {
            const swalModal = document.querySelector('.swal2-modal');
            if (swalModal) {
              swalModal.style.zIndex = '1060';
            }
          }
        }).then((result) => {
          if (result.isConfirmed) {
            var telefono = "51" + result.value;
            var url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(message);
            window.open(url, '_blank');
          }
        });
      } else if (result.isDenied) {
        var url = "https://wa.me/?text=" + encodeURIComponent(message);
        window.open(url, '_blank');
      }
    });
  }
