<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>
    /* Switch compacto para observaciones */
    .switch-obs {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }
    .switch-obs input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider-obs {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 18px;
      transition: .3s;
    }
    .slider-obs:before {
      position: absolute;
      content: "";
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }
    .switch-obs input:checked + .slider-obs {
      background-color: #ff9800;
    }
    .switch-obs input:checked + .slider-obs:before {
      transform: translateX(16px);
    }
    .switch-obs input:disabled + .slider-obs {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .obs-row-panel {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .obs-input-comment {
      flex: 1;
      min-width: 80px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.8em;
      height: 28px;
    }
    .obs-cam-label {
      cursor: pointer;
      font-size: 1.1em;
      margin: 0;
      color: #555;
      flex-shrink: 0;
    }
    .obs-cam-label:hover {
      color: #ff9800;
    }
    .obs-thumbs-container {
      display: none;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .obs-thumb-wrapper {
      position: relative;
      display: inline-block;
    }
    .obs-thumb-wrapper img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .obs-thumb-remove {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #e53935;
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .obs-thumb-label {
      position: absolute;
      top: -3px;
      left: -3px;
      background: #2c5aa0;
      color: #fff;
      border-radius: 50%;
      width: 15px;
      height: 15px;
      font-size: 8px;
      line-height: 15px;
      text-align: center;
      font-weight: bold;
    }
    /* ── Firma del Responsable ── */
    #firma-section {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #f8f9fa;
    }
    #firma-canvas {
      border: 2px dashed #aaa;
      border-radius: 6px;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      display: block;
      margin: 0 auto;
      width: 100%;
      max-width: 500px;
      height: 130px;
    }
  </style>
</head>

  <script>
    setInterval(()=>{
           const time = document.querySelector(".display #time");
           let date = new Date();
           let hours = date.getHours();
           let minutes = date.getMinutes();
           let seconds = date.getSeconds();
           let day_night = "AM";
           if(hours > 12){
             day_night = "PM";
             hours = hours - 12;
           }
           if(seconds < 10){
             seconds = "0" + seconds;
           }
           if(minutes < 10){
             minutes = "0" + minutes;
           }
           if(hours < 10){
             hours = "0" + hours;
           }
           time.textContent = hours + ":" + minutes + ":" + seconds + " "+ day_night;
         });

<!-- dropdown -->
  <script>
  // ── Variables globales ──────────────────────────────────────────────
  var arrayOfValues;

  // ── 1. Carga inicial ──────────────────────────────────────────────
  function afterPageLoads() {
    // Pasar el cargo del usuario para filtrar el inventario según col F
    var _ud = _getLoginData();
    var _cargo = _ud.cargo || '';
    google.script.run.withSuccessHandler(afterDropdownArrayReturned).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).getDropDownarray(_cargo);
    google.script.run.withSuccessHandler(populateResponsables).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).getResponsablesPersonal();
    google.script.run.withSuccessHandler(populateSupervisores).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).getSupervisoresOperaciones();
  }

  // ── 2. Recibe datos de INVENTARIO (cols B-R) ──────────────────────
  //   índices en arrayOfValues (después de slice(1) en backend):
  //   0=B empresa | 1=C área | 2=D equipo | 3=E código/placa
  //   4=F cargo responsable (filtrado por login)
  //   6=H msg1    | 10=L lugar            | 12=N msg2    | 13=O estado
  function afterDropdownArrayReturned(arrayOfArrays) {
    arrayOfValues = arrayOfArrays.filter(function(r) { return true; });
    var item = document.getElementById("ad1");
    addUniqueOptionToDropDown(item, arrayOfValues, 0);
    afterfirstDropDownChange();
    aftersecondDropDownChange();
  }

  // ── 3. Poblar responsables en ad6 ────────────────────────────────
  //    Si el usuario logueado NO es supervisor → ad6 se auto-llena
  //    con su nombre (no editable).
  //    Si es supervisor → ad6 queda como select con todo el personal.
  function populateResponsables(lista) {
    var sel = document.getElementById("ad6");
    var userData = _getLoginData();
    var esSupervisor = userData.cargo && userData.cargo.toLowerCase().includes('supervisor');

    if (!esSupervisor && userData.nombre) {
      // Trabajador regular → ad6 fijo con su nombre, sin editar
      sel.innerHTML = '';
      var opt = document.createElement("option");
      opt.value = userData.nombre;
      opt.textContent = userData.nombre;
      sel.appendChild(opt);
      sel.value = userData.nombre;
      sel.disabled = true;
      sel.style.backgroundColor = '#e9ecef';
    } else {
      // Supervisor → select completo con opción especial + todo el personal
      sel.innerHTML = '<option value="">-- Selecciona Responsable --</option>';
      sel.disabled = false;
      sel.style.backgroundColor = '';
      var specialOpt = document.createElement("option");
      specialOpt.value = 'Área inspeccionada sin personal presente';
      specialOpt.textContent = 'Área inspeccionada sin personal presente';
      sel.appendChild(specialOpt);
      (lista || []).forEach(function(nombre) {
        var opt = document.createElement("option");
        opt.value = nombre;
        opt.textContent = nombre;
        sel.appendChild(opt);
      });
    }
  }

  // ── Auto-poblar Inspector (Supervisor de Operaciones) en adSup readonly ──
  //    Si el logueado es supervisor → usa SU nombre.
  //    Si no → usa el primer supervisor de la lista.
  var supervisorNombre = '';
  function populateSupervisores(lista) {
    var inp = document.getElementById("adSup");
    if (!inp) return;
    var userData = _getLoginData();
    var esSupervisor = userData.cargo && userData.cargo.toLowerCase().includes('supervisor');

    if (esSupervisor && userData.nombre) {
      // Si el logueado es supervisor, poner SU nombre (no el primero de la lista)
      supervisorNombre = userData.nombre;
    } else {
      supervisorNombre = (lista && lista.length > 0) ? lista[0] : '';
    }
    inp.value = supervisorNombre;
  }

  // ── Helper: obtener datos del usuario logueado desde localStorage ──
  function _getLoginData() {
    try {
      return JSON.parse(localStorage.getItem('userName') || '{}');
    } catch(e) { return {}; }
  }

  // ── Helper: separar valores múltiples de col L de INVENTARIO ──────
  // Google Sheets multi-select usa coma; fallback: dobles espacios
  function splitLugares(valorL) {
    valorL = String(valorL || '').trim();
    if (!valorL) return [];
    var partes;
    if (valorL.includes(',')) {
      partes = valorL.split(',');
    } else if (valorL.includes('\n')) {
      partes = valorL.split('\n');
    } else if (valorL.includes('  ')) {
      // Doble espacio como separador (multi-select sin coma)
      partes = valorL.split(/\s{2,}/);
    } else {
      partes = [valorL];
    }
    return partes.map(function(p) { return p.trim(); }).filter(function(p) { return p; });
  }

  // ── 4. Helper: poblar select con valores únicos ──────────────────
  function addUniqueOptionToDropDown(el, arrayOfArrays, index) {
    var currentlyAdded = [];
    el.innerHTML = '';
    arrayOfArrays.forEach(function(r) {
      if (currentlyAdded.indexOf(r[index]) === -1) {
        var option = document.createElement("option");
        option.textContent = r[index];
        el.appendChild(option);
        currentlyAdded.push(r[index]);
      }
    });
  }

  // ── 5. Empresa cambia → recarga Área ─────────────────────────────
  function afterfirstDropDownChange() {
    var ad2 = document.getElementById("ad2");
    var ad1 = document.getElementById("ad1").value;
    var filtered = arrayOfValues.filter(function(r) { return r[0] === ad1; });
    addUniqueOptionToDropDown(ad2, filtered, 1);
    aftersecondDropDownChange();
  }

  // ── 6. Área cambia → recarga Equipo ──────────────────────────────
  function aftersecondDropDownChange() {
    var itemtype = document.getElementById("ad3");
    var ad1 = document.getElementById("ad1").value;
    var ad2 = document.getElementById("ad2").value;
    // r[17] === false → ya inspeccionado dentro del período → no mostrar en equipo
    var filtered = arrayOfValues.filter(function(r) { return r[0] === ad1 && r[1] === ad2 && r[17] !== false; });
    // Primer opción vacía para evitar auto-selección y que la sección oculta no aparezca sola
    itemtype.innerHTML = '<option value="">-- Selecciona Equipo --</option>';
    filtered.forEach(function(r) {
      var eq = r[2];
      if (eq && itemtype.querySelector('option[value="' + eq.replace(/"/g, '\\"') + '"]') === null) {
        var opt = document.createElement("option");
        opt.value = eq;
        opt.textContent = eq;
        itemtype.appendChild(opt);
      }
    });
    afterEquipoChange();
  }

  // ── 7. Equipo (ad3) cambia → muestra sección, recarga Lugares ────
  function afterEquipoChange() {
    var equipo  = document.getElementById("ad3").value;
    var ad5     = document.getElementById("ad5");
    var hidden  = document.getElementById("hidden-check-section");

    // Limpiar mensajes y ad4
    document.getElementById("messageE").textContent = '';
    document.getElementById("message1").textContent  = '';
    document.getElementById("message2").textContent  = '';
    document.getElementById("ad4").value             = '';
    document.getElementById("tableshow").style.display = 'none';

    if (!equipo) {
      hidden.style.display = 'none';
      return;
    }

    hidden.style.display = 'block';

    // Poblar Lugar (col L = índice 10) filtrado por equipo y período
    var ad1 = document.getElementById("ad1").value;
    var ad2 = document.getElementById("ad2").value;
    var filas = arrayOfValues.filter(function(r) {
      return r[0] === ad1 && r[1] === ad2 && r[2] === equipo;
    });
    // r[18] = lugares disponibles (filtrados por período en el servidor)
    // Si no está definido, mostrar todos los lugares del col L
    var lugaresUnicos = [];
    filas.forEach(function(r) {
      var avail = Array.isArray(r[18]) ? r[18] : splitLugares(r[10]);
      avail.forEach(function(lug) {
        if (lug && lugaresUnicos.indexOf(lug) === -1) lugaresUnicos.push(lug);
      });
    });
    lugaresUnicos.sort();

    ad5.innerHTML = '<option value="">-- Selecciona Lugar --</option>';
    lugaresUnicos.forEach(function(lug) {
      var opt = document.createElement("option");
      opt.value = lug;
      opt.textContent = lug;
      ad5.appendChild(opt);
    });
  }

  // ── 8. Lugar (ad5) cambia → auto-pobla ad4 + muestra descripciones ─
  function afterLugarChange() {
    var equipo = document.getElementById("ad3").value;
    var lugar  = document.getElementById("ad5").value;
    var ad1    = document.getElementById("ad1").value;
    var ad2    = document.getElementById("ad2").value;

    document.getElementById("messageE").textContent = '';
    document.getElementById("message1").textContent  = '';
    document.getElementById("message2").textContent  = '';
    document.getElementById("ad4").value             = '';
    document.getElementById("tableshow").style.display = 'none';

    if (!equipo || !lugar) return;

    // Buscar la fila cuya col L contiene el lugar seleccionado (puede ser multi-valor)
    var fila = null;
    for (var i = 0; i < arrayOfValues.length; i++) {
      var r = arrayOfValues[i];
      if (r[0] === ad1 && r[1] === ad2 && r[2] === equipo) {
        if (splitLugares(r[10]).indexOf(lugar) !== -1) {
          fila = r;
          break;
        }
      }
    }

    if (fila) {
      // Auto-poblar código/placa oculto (col E = índice 3)
      document.getElementById("ad4").value = fila[3] || '';

      // Mostrar col E como descripción azul
      var msgE = document.getElementById("messageE");
      if (fila[3]) msgE.textContent = '📋 Código/Placa: ' + fila[3];

      // Mostrar col H (índice 6) y col N (índice 12) como mensajes azules
      var msg1 = document.getElementById("message1");
      var msg2 = document.getElementById("message2");
      if (fila[6]) msg1.textContent = '⚠︎ ' + fila[6];
      if (fila[11]) msg2.textContent = 'Frecuencia: ' + fila[11];

      // Auto-disparar búsqueda del checklist
      document.getElementById('tableshow').style.display = 'none';
      document.getElementById('serach').click();
    }
  }

  function runcodepost() {
    var t1  = document.getElementById("ad1").value;
    var u1  = document.getElementById("ad2").value;
    var ch1 = document.getElementById("ad3").value;
    var ch2 = document.getElementById("ad4").value;
    if (ch2.length !== "") {
      google.script.run.withSuccessHandler(updatecodepost).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).setcodepost(t1, u1, ch1, ch2);
    }
  }

  // ── Event listeners ──────────────────────────────────────────────
  document.getElementById("ad1").addEventListener("change", afterfirstDropDownChange);
  document.getElementById("ad2").addEventListener("change", aftersecondDropDownChange);
  document.getElementById("ad3").addEventListener("change", afterEquipoChange);
  document.getElementById("ad5").addEventListener("change", afterLugarChange);

</script>

<!-- Check -->
<script>
function loaddata() {
  event.preventDefault();
  $('#dataTable2').show();
  var user = {};
  user.ad4 = document.getElementById("ad4").value;
  user.ad3 = document.getElementById("ad3").value;
  google.script.run.withSuccessHandler(showDataTable).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).getDataCheckList(user);
}

function showDataTable(result) {
  if (result.length > 0) {
    $(document).ready(function() {
      var table = $('#example').DataTable({
        data: result,
        destroy: true,
        searching: false,
        paging: false,
        ordering: false,
        info: false,
        scrollY: '100px',
        scrollCollapse: true,
        responsive: true,
        columns: [
          { 'title': 'Fecha' },
          { 'title': 'SI' },
          { 'title': 'NO' },
          { 'title': 'ID' },
          { 'title': 'Equipo' }
        ],
        columnDefs: [

  // HiDPI: usar getBoundingClientRect para el tamaño visual real
  var rect = canvas.getBoundingClientRect();
  var ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width  = Math.max(rect.width  || 300, 50) * ratio;
  canvas.height = (rect.height || 130) * ratio;
  canvas.getContext('2d').scale(ratio, ratio);

  firmaSignaturePad = new SignaturePad(canvas, {
    backgroundColor: 'rgba(255,255,255,0)',
    penColor: '#222222',
    minWidth: 1.5,
    maxWidth: 3.5,
  });

// =============================================
// CONSTRUIR FILA DE SWITCH POR SECCIÓN

function buildSwitchRow(sectionIdx) {

    "<td colspan='4' style='padding:5px 8px; background:#f0f0f0; border-top:1px solid #ddd;'>" +

        "<label class='switch-obs'>" +
          "<input type='checkbox' id='switch-" + sectionIdx + "' disabled onchange='toggleObsPanel(" + sectionIdx + ")'>" +
          "<span class='slider-obs'></span>" +
        "</label>" +
        "<div id='obs-panel-" + sectionIdx + "' style='display:none; flex:1;'>" +
          "<div id='obs-items-" + sectionIdx + "'></div>" +
        "</div>" +
      "</div>" +
    "</td>" +
  "</tr>";
}


// =============================================
// MOSTRAR TABLA (MODIFICADO CON SWITCHES)
// =============================================
function showTable(dataArray) {
    if (dataArray && dataArray !== undefined && dataArray.length != 0) {
        // Reset fotos de secciones
        sectionPhotos = {};
        totalSections = 0;

        var sectionIndex = -1;
        var rows = [];

        // Primer paso: identificar secciones
        for (var i = 0; i < dataArray.length; i++) {
            var itemText = dataArray[i][2];
            var esTitulo = /^\d+\./.test(itemText.trim());

            if (esTitulo) {
                sectionIndex++;
            }

            rows.push({
                type: esTitulo ? 'title' : 'item',
                data: dataArray[i],
                section: Math.max(sectionIndex, 0),
                idx: i
            });
        }

        totalSections = sectionIndex + 1;

        // Construir tabla
        var result = "<table class='table table-sm table-bordered' id='dtable' style='font-size:0.9em; border-radius:8px; overflow:hidden;'>" +
            "<thead class='table-light text-center sticky-top'>" +
            "<tr>" +
            "<th scope='col' style='color:green; font-size:18px; max-width:20px; width:20px;'><i class='fa-solid fa-circle-check'></i></th>" +
            "<th scope='col' style='color:red; font-size:18px; max-width:20px; width:20px;'><i class='fa-solid fa-circle-xmark'></i></th>" +
            "<th scope='col' style='color:blue; font-size:18px; max-width:20px; width:20px;'><i class='fa-solid fa-circle-minus'></i></th>" +
            "<th scope='col' style='font-size:17px;'>Ítems de Verificación</th>" +
            "</tr>" +
            "</thead><tbody>";

        var currentSection = -1;
        var itemCounter = 0;

        for (var r = 0; r < rows.length; r++) {
            var row = rows[r];

            // Si aparece un nuevo título y ya hubo sección previa → cerrar con switch
            if (row.type === 'title' && currentSection >= 0) {
                result += buildSwitchRow(currentSection);
            }

            if (row.type === 'title') {
                currentSection = row.section;
            }

            var i = row.idx;
            for (var j = 2; j < row.data.length; j++) {
                if (row.type === 'title') {
                    result += "<tr class='align-middle text-start' data-section='" + row.section + "' data-type='title'>";
                    result += "<td colspan='4' style=\"font-weight:bold; font-size:0.9em; color:#ffffff; background-color:#2c5aa0; padding:9px; text-align:center; border:none;\">";
                    result += "<i class='fa-solid fa-list-check me-2'></i>" + row.data[j];
                    result += "<input type=\"radio\" name=\"option" + i + "\" value=\"NA\" class=\"form-check-input multi radio-blue\" checked style=\"display:none;\" />";
                    result += "</td>";
                    result += "</tr>";
                } else {
                    itemCounter++;
                    result += "<tr class='align-middle text-start' data-section='" + row.section + "' data-type='item' data-itemnum='" + itemCounter + "'>";
                    result += "<td>";
                    result += "<input type=\"radio\" name=\"option" + i + "\" value=\"Si\" class=\"form-check-input multi radio-green\" checked onchange=\"checkSectionNos(" + row.section + ")\" />";
                    result += "</td>";
                    result += "<td>";
                    result += "<input type=\"radio\" name=\"option" + i + "\" value=\"No\" class=\"form-check-input multi radio-red\" onchange=\"checkSectionNos(" + row.section + ")\" />";
                    result += "</td>";
                    result += "<td>";
                    result += "<input type=\"radio\" name=\"option" + i + "\" value=\"NA\" class=\"form-check-input multi radio-blue\" onchange=\"checkSectionNos(" + row.section + ")\" />";
                    result += "</td>";

                    if (row.data[j].includes("*")) {
                        result += "<td style=\"color:red; font-weight:bold; text-align:left; font-size:0.9em; padding-left:20px;\">" + row.data[j] + "</td>";
                    } else {
                        result += "<td style=\"text-align:left; font-size:0.9em; padding-left:20px;\">" + row.data[j] + "</td>";
                    }
                    result += "</tr>";
                }
            }
        }

        // Cerrar última sección con switch
        if (currentSection >= 0) {
            result += buildSwitchRow(currentSection);
        }

        result += "</tbody></table>";

        var div = document.getElementById('search-results');
        div.innerHTML = result;
        $('#tableshow').show();
        $('#image-upload').show();
        document.getElementById('btn-enviar-check').style.display = '';
    } else {
        var div = document.getElementById('search-results');
        div.innerHTML = "<div class='alert alert-warning text-center'>¡Datos no encontrados!</div>";
        $('#tableshow').show();
    }
}


// =============================================
// DETECTAR "NO" EN SECCIÓN → HABILITAR SWITCH
// =============================================
function checkSectionNos(sectionIdx) {
    var nosChecked = document.querySelectorAll('tr[data-section="' + sectionIdx + '"][data-type="item"] input[type="radio"][value="No"]:checked');
    var switchEl = document.getElementById('switch-' + sectionIdx);
    if (!switchEl) return;

    if (nosChecked.length > 0) {
        switchEl.disabled = false;
        if (switchEl.checked) buildPerItemCameras(sectionIdx);
    } else {
        switchEl.disabled = true;
        switchEl.checked = false;
        toggleObsPanel(sectionIdx);
    }
}


// =============================================
// TOGGLE PANEL DE OBSERVACIÓN
// =============================================
function toggleObsPanel(sectionIdx) {
    var switchEl = document.getElementById('switch-' + sectionIdx);
    var panel = document.getElementById('obs-panel-' + sectionIdx);
    if (!panel) return;

    if (switchEl && switchEl.checked) {
        panel.style.display = 'block';
        buildPerItemCameras(sectionIdx);
    } else {
        panel.style.display = 'none';
    }
}


// =============================================
// CONSTRUIR CÁMARAS POR ÍTEM "NO"
// =============================================
function buildPerItemCameras(sectionIdx) {
    var container = document.getElementById('obs-items-' + sectionIdx);
    if (!container) return;

    var noRadios = document.querySelectorAll('tr[data-section="' + sectionIdx + '"][data-type="item"] input[type="radio"][value="No"]:checked');
    var html = '';

    noRadios.forEach(function(radio) {
        var row = radio.closest('tr');
        var itemNum = row.getAttribute('data-itemnum');
        var itemText = row.querySelector('td:last-child').textContent.trim();
        var shortText = itemText.length > 35 ? itemText.substring(0, 35) + '…' : itemText;
        var key = sectionIdx + '-' + itemNum;

        // Preserve existing comment if already typed
        var existingComment = '';
        var existingInput = document.getElementById('obs-comment-' + key);
        if (existingInput) existingComment = existingInput.value;

        html += '<div style="margin:4px 0; padding:5px 6px; background:#fff; border-radius:5px; border:1px solid #e8e8e8;">' +
          '<div style="display:flex; align-items:center; gap:4px; margin-bottom:4px;">' +
            '<span style="font-size:0.75em; color:#dc3545; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">❌ <b>' + itemNum + '.</b> ' + shortText + '</span>' +
            '<label for="obs-photo-' + key + '" class="obs-cam-label" style="flex-shrink:0;" title="Agregar foto ítem ' + itemNum + '"><i class="fa-solid fa-camera"></i></label>' +
            '<input type="file" id="obs-photo-' + key + '" accept="image/*" capture="environment" style="display:none;" onchange="addSectionPhoto(' + sectionIdx + ',' + itemNum + ',event)">' +
          '</div>' +
          '<input type="text" id="obs-comment-' + key + '" class="obs-input-comment" placeholder="Comentario ítem ' + itemNum + '..." style="width:100%;" value="' + existingComment.replace(/"/g, '&quot;') + '">' +
          '<div id="obs-thumbs-' + key + '" style="display:flex; gap:4px; flex-wrap:wrap; margin-top:3px;"></div>' +
        '</div>';
    });

    container.innerHTML = html || '<div style="font-size:0.75em; color:#999;">Sin ítems No</div>';

    // Re-render existing thumbnails after rebuilding the container
    noRadios.forEach(function(radio) {
        var row = radio.closest('tr');
        var itemNum = row.getAttribute('data-itemnum');
        renderThumbs(sectionIdx, itemNum);
    });
}


// =============================================
// AGREGAR FOTO CON ITEM + FECHA/HORA ESTAMPADA
// =============================================
function addSectionPhoto(sectionIdx, itemNum, event) {
    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var maxW = 800;
            var scale = img.width > maxW ? maxW / img.width : 1;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            var now = new Date();
            var stamp = String(now.getDate()).padStart(2, '0') + '/' +
                        String(now.getMonth() + 1).padStart(2, '0') + '/' +
                        now.getFullYear() + '  ' +
                        String(now.getHours()).padStart(2, '0') + ':' +
                        String(now.getMinutes()).padStart(2, '0') + ':' +
                        String(now.getSeconds()).padStart(2, '0');

            var fontSize = Math.max(14, Math.floor(canvas.width * 0.035));
            ctx.font = 'bold ' + fontSize + 'px Arial';

            // ✅ ITEM label esquina superior izquierda
            var itemLabel = 'ITEM ' + itemNum;
            var labelW = ctx.measureText(itemLabel).width;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(4, 4, labelW + 14, fontSize + 10);
            ctx.fillStyle = '#FFD700';
            ctx.fillText(itemLabel, 11, fontSize + 7);

            // ✅ Fecha/hora esquina inferior derecha
            var textW = ctx.measureText(stamp).width;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(canvas.width - textW - 18, canvas.height - fontSize - 14, textW + 14, fontSize + 10);
            ctx.fillStyle = '#FFD700';
            ctx.fillText(stamp, canvas.width - textW - 11, canvas.height - 11);

            var stampedBase64 = canvas.toDataURL('image/jpeg', 0.8);

            if (!sectionPhotos[sectionIdx]) sectionPhotos[sectionIdx] = [];
            sectionPhotos[sectionIdx].push({ num: itemNum, b64: stampedBase64 });
            renderThumbs(sectionIdx, itemNum);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}


// =============================================
// ELIMINAR FOTO DE SECCIÓN
// =============================================
function removeSectionPhoto(sectionIdx, itemNum, photoIdx) {
    var allPhotos = sectionPhotos[sectionIdx] || [];
    // photoIdx is relative to filtered photos for this itemNum
    var itemPhotos = allPhotos.filter(function(p) { return String(p.num) === String(itemNum); });
    var target = itemPhotos[photoIdx];
    if (!target) return;
    var mainIdx = allPhotos.indexOf(target);
    if (mainIdx !== -1) sectionPhotos[sectionIdx].splice(mainIdx, 1);
    renderThumbs(sectionIdx, itemNum);
}


// =============================================
// RENDERIZAR THUMBNAILS POR ÍTEM
// =============================================
function renderThumbs(sectionIdx, itemNum) {
    var key = sectionIdx + '-' + itemNum;
    var container = document.getElementById('obs-thumbs-' + key);
    if (!container) return;
    container.innerHTML = '';
    var photos = (sectionPhotos[sectionIdx] || []).filter(function(p) { return String(p.num) === String(itemNum); });

    photos.forEach(function(photo, idx) {
        var div = document.createElement('div');
        div.className = 'obs-thumb-wrapper';
        div.innerHTML = '<img src="' + photo.b64 + '">' +
            '<span class="obs-thumb-label">' + photo.num + '</span>' +
            '<button class="obs-thumb-remove" onclick="removeSectionPhoto(' + sectionIdx + ',' + itemNum + ',' + idx + ')">✕</button>';
        container.appendChild(div);
    });

    container.style.display = photos.length > 0 ? 'flex' : 'none';
}


// =============================================
// GENERAR COLLAGE POR ÍTEM (array de {b64} objetos)
// =============================================
function buildItemCollage(photosArr) {
    return new Promise(function(resolve) {
        if (photosArr.length === 0) { resolve(''); return; }
        if (photosArr.length === 1) { resolve(photosArr[0].b64); return; }

        var images = [];
        var loaded = 0;

        photosArr.forEach(function(photo, i) {
            var img = new Image();
            img.onload = function() {
                images[i] = img;
                loaded++;
                if (loaded === photosArr.length) {
                    var cols = 2;
                    var rows = Math.ceil(photosArr.length / cols);
                    var cellW = 400;
                    var cellH = 300;

                    var canvas = document.createElement('canvas');
                    canvas.width = cellW * cols;
                    canvas.height = cellH * rows;
                    var ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    images.forEach(function(im, idx) {
                        var col = idx % cols;
                        var row = Math.floor(idx / cols);
                        var x = col * cellW;
                        var y = row * cellH;

                        var sc = Math.min(cellW / im.width, cellH / im.height);
                        var w = im.width * sc;
                        var h = im.height * sc;

                        ctx.drawImage(im, x + (cellW - w) / 2, y + (cellH - h) / 2, w, h);
                        ctx.strokeStyle = '#ddd';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, cellW, cellH);
                    });

                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                }
            };
            img.src = photo.b64;
        });
    });
}


// =============================================
// RECOPILAR OBSERVACIONES DE TODAS LAS SECCIONES
// Nuevo formato: [{section, items: [{num, comment, image}]}]
// =============================================
async function collectSectionObservations() {
    var observations = [];

    for (var s = 0; s < totalSections; s++) {
        var switchEl = document.getElementById('switch-' + s);
        if (!switchEl || !switchEl.checked) continue;

        var noRadios = document.querySelectorAll(
            'tr[data-section="' + s + '"][data-type="item"] input[type="radio"][value="No"]:checked'
        );
        var items = [];

        for (var r = 0; r < noRadios.length; r++) {
            var tr = noRadios[r].closest('tr');
            var itemNum = tr.getAttribute('data-itemnum');
            var key = s + '-' + itemNum;

            var commentEl = document.getElementById('obs-comment-' + key);
            var comment = commentEl ? commentEl.value.trim() : '';

            var itemPhotos = (sectionPhotos[s] || []).filter(function(p) {
                return String(p.num) === String(itemNum);
            });
            var image = '';
            if (itemPhotos.length > 0) {
                image = await buildItemCollage(itemPhotos);
            }

            if (comment || image) {
                items.push({ num: itemNum, comment: comment, image: image });
            }
        }

        if (items.length > 0) {
            observations.push({ section: s, items: items });
        }
    }

    return observations;
}

    title: '¿Los datos son correctos?',
    text: 'Revisa el checklist antes de continuar. Si hay algún error, presiona "No, editar".',
    showCancelButton: true,
    confirmButtonText: '<i class="fa-solid fa-check"></i> Sí, continuar',
    cancelButtonText:  '<i class="fa-solid fa-pencil"></i> No, editar',
    confirmButtonColor: '#198754',
    cancelButtonColor:  '#6c757d',
  });

  if (!confirmResult.isConfirmed) return;

  // 3. Abrir modal de firma (separado del formulario)
  abrirFirmaModal();
}


function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function() {
        var output = document.getElementById('image-preview');
        output.src = reader.result;
        output.style.display = 'block';
        document.getElementById('imageData').value = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}

function savesuccess(result) {
  // Reset firma modal button
  var btnFirmar = document.getElementById('btn-firmar-guardar');
  if (btnFirmar) {
    btnFirmar.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Firmar y Guardar';
    btnFirmar.disabled = false;
  }
  Swal.fire({
    title: 'Guardando datos...',
    text: 'Por favor, espera un momento.',
    icon: 'info',
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });
  setTimeout(() => {
    Swal.fire({
      position: 'top-center',
      icon: 'success',
      title: 'Enviado correctamente',
      html: 'Código de registro: ' + result.columnAValue +
          '<br><br><button class="btn btn-danger" id="exportPdfBtn" data-column-a="' + result.columnAValue + '">Exportar PDF</button>',
      showConfirmButton: true,
      confirmButtonText: 'Cerrar',
      allowOutsideClick: false
    }).then((res) => {
      if (res.isConfirmed) {
        clearForm();
        if (typeof reiniciarTablaCheck === 'function') reiniciarTablaCheck();
      }
    });

    let totalCheck1 = document.getElementById('totalCheck1');
    let totalCheck2 = document.getElementById('totalCheck2');
    google.script.run.withSuccessHandler(function(data) {
      totalCheck1.innerHTML = data[0];
      totalCheck2.innerHTML = data[1];
    }).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).setStatusCheck();
  }, 500);
}

document.addEventListener('click', function(event) {
  if (event.target && event.target.id === 'exportPdfBtn') {
    let columnAValue = event.target.getAttribute('data-column-a');

    Swal.fire({
      title: '¿Desea exportar este reporte a PDF?',
      text: "Se generará un documento con los datos correspondientes.",
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sí, exportar',
      cancelButtonText: 'Cancelar'
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: 'Generando PDF...',
          text: 'Por favor, espere.',
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
          }
        });

        generatePdf(columnAValue);
      }
    });
  }
});

function generatePdf(columnAValue) {
    Swal.fire({
        title: 'Generando PDF...',
        text: 'Por favor, espera un momento.',
        icon: 'info',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    google.script.run.withSuccessHandler(function(pdfUrl) {
        Swal.fire({
            position: 'top-center',
            icon: 'success',
            title: 'PDF generado',
            text: 'El PDF se ha generado correctamente.',
            showConfirmButton: true,
            confirmButtonText: 'Cerrar',
            allowOutsideClick: false
        }).then((result) => {
            if (result.isConfirmed) {
                $('#exampleModal2').modal('hide');
                clearForm();
            }
        });

        window.open(pdfUrl, '_blank');
    }).withFailureHandler(function(err){ console.error('[GAS Error]', err.message || err); }).getPdfUrl(columnAValue);
}

function clearForm() {
  const form = document.getElementById('search-form');
  const inputs = form.querySelectorAll('input, select, textarea');

  inputs.forEach(input => {
    if (input.tagName === 'SELECT') {
      input.selectedIndex = 0;
    } else if (input.type === 'file') {
      input.value = '';
    } else if (input.readOnly) {
      // No borrar campos de solo lectura
    } else {
      input.value = '';
    }
  });

  // Restaurar Inspector (readonly, auto-poblado)
  var supInp = document.getElementById('adSup');
  if (supInp && supervisorNombre) supInp.value = supervisorNombre;

  document.getElementById('ad7').value = '';
  // ad6: si es trabajador regular se mantiene su nombre; si es supervisor se resetea al primer option
  var _ud = _getLoginData();
  var _esSup = _ud.cargo && _ud.cargo.toLowerCase().includes('supervisor');
  if (!_esSup && _ud.nombre) {
    document.getElementById('ad6').value = _ud.nombre;
  } else {
    document.getElementById('ad6').selectedIndex = 0;
  }
  // Restaurar tipo de inspección a "Planeada"
  var radioPlaneada = document.getElementById('tipoPlaneada');
  if (radioPlaneada) radioPlaneada.checked = true;
  var hiddenTipo = document.getElementById('tipoInspeccion');
  if (hiddenTipo) hiddenTipo.value = 'Planeada';

  // Restaurar etiqueta de firma
  var firmaLabel2 = document.getElementById('firma-label-text');
  if (firmaLabel2) firmaLabel2.textContent = 'Firma Responsable de Área:';

  const imagePreview = document.getElementById('image-preview');
  imagePreview.src = '';
  imagePreview.style.display = 'none';

  document.getElementById('imageData').value = '';

  document.querySelectorAll('.multi').forEach(radio => {
    radio.checked = (radio.value === 'Si');
  });

  const fileInput = document.getElementById('image-upload');
  fileInput.removeEventListener('change', previewImage);
  fileInput.addEventListener('change', previewImage);

  document.getElementById('messageE').textContent = '';
  document.getElementById('message1').textContent = '';
  document.getElementById('message2').textContent = '';

  // ✅ Ocultar tabla y sección de check
  document.getElementById('tableshow').style.display = 'none';
  document.getElementById('hidden-check-section').style.display = 'none';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('dataTable2').style.display = 'none';
  document.getElementById('btn-enviar-check').style.display = 'none';

  // ✅ Limpiar firma del responsable
  limpiarFirma();
  var nombreDisplay = document.getElementById('firma-nombre-display');
  if (nombreDisplay) nombreDisplay.textContent = '';

  // ✅ Limpiar observaciones de secciones
  sectionPhotos = {};
  for (var s = 0; s < totalSections; s++) {
    var switchEl = document.getElementById('switch-' + s);
    if (switchEl) {
      switchEl.checked = false;
      switchEl.disabled = true;
    }
    var panel = document.getElementById('obs-panel-' + s);
    if (panel) { panel.style.display = 'none'; var obsEl = panel.querySelector('[id^="obs-items-"]'); if (obsEl) obsEl.innerHTML = ''; }
  }
}

function validateForm() {
  const form = document.getElementById('search-form');
  const inputs = form.querySelectorAll('input, select, textarea');
  let valid = true;

  inputs.forEach(input => {
    if (
      input.type !== 'file' &&
      input.type !== 'radio' &&
      input.hasAttribute('required') &&
      input.value.trim() === ''
    ) {
      valid = false;
    }
  });

  return valid;
}
