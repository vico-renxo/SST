name = "asistente-capacicode"
main = "worker.js"
compatibility_date = "2024-09-23"

# Workers AI (Llama 3.1 — GRATIS en plan free)
[[ai]]
binding = "AI"

# KV para caché de respuestas (reducir llamadas a GAS)
# Crear con: wrangler kv namespace create CACHE
# Luego pegar el id que te dé aquí abajo
[[kv_namespaces]]
binding = "CACHE"
id = "REEMPLAZAR_CON_TU_KV_ID"

# GAS_URL se configura con:
# wrangler secret put GAS_URL
# (pega tu URL https://script.google.com/macros/s/.../exec)

# ============================================================
# WORKER DE PUSH NOTIFICATIONS (cloudflare-worker.js)
# Configurar con los siguientes comandos wrangler secret:
#   wrangler secret put VAPID_PUBLIC_KEY
#   wrangler secret put VAPID_PRIVATE_KEY
#   wrangler secret put PUSH_AUTH_TOKEN
#   wrangler secret put GAS_URL
# KV namespace para suscripciones:
#   wrangler kv namespace create PUSH_SUBSCRIPTIONS
#   (luego pegar el id generado en el binding de abajo)
# ============================================================
