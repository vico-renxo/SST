/* ── Shell principal ── */
#miVista2 #sidebar-wrapper.sidebar-shell {
  position: fixed;
  top: 56px; left: 0;

  flex-direction: column;
  z-index: 1025;
  transition: left .28s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}

/* ── Cabecera logo (movida al navbar) ── */
#miVista2 .sidebar-top { display: none; }
#miVista2 .sidebar-logo-wrap { display:none; }
#miVista2 .sidebar-logo-image { display:none; }

/* ── Nav scrollable ── */
#miVista2 .sidebar-nav {

  overflow-x: hidden;

}
#miVista2 .sidebar-nav::-webkit-scrollbar { width:4px; }

/* ── Sección ── */
#miVista2 .sidebar-section { margin-bottom: .15rem; }
#miVista2 .sidebar-section-title {
  padding: .85rem .45rem .25rem;
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .09em;
  color: #94a3b8;
  text-transform: uppercase;
  margin: 0;
  user-select: none;
}

/* ── Link estándar ── */
#miVista2 .sidebar-link {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .38rem .6rem;
  margin: .08rem 0;
  border-radius: .5rem;
  font-size: .78rem;
  font-weight: 500;
  color: #374151;
  text-decoration: none;
  cursor: pointer;
  border: none;
  border-left: 3px solid transparent;
  background: transparent;
  width: 100%;
  transition: background .15s ease, color .15s ease;
}
#miVista2 .sidebar-link:hover {
  background: #f1f5f9;
  color: #1e40af;
  text-decoration: none;
}
#miVista2 .sidebar-link.active {
  background: #eff6ff;
  color: #1d4ed8;
  font-weight: 600;
  border-left-color: #2563eb;
}
#miVista2 .sidebar-link-icon {
  width: 15px;
  text-align: center;
  font-size: .78rem;
  flex-shrink: 0;
  color: inherit;
}

/* ── Group toggle ── */
#miVista2 .sidebar-group { margin: .08rem 0; }
#miVista2 .sidebar-group-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .38rem .6rem;
  margin: .08rem 0;
  border-radius: .5rem;
  font-size: .78rem;
  font-weight: 500;
  color: #374151;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  width: 100%;
  cursor: pointer;
  text-align: left;
  transition: background .15s ease, color .15s ease;
}
#miVista2 .sidebar-group-toggle:hover { background:#f1f5f9; color:#1e40af; }
#miVista2 .sidebar-group-toggle.open {
  background: #f8fafc;
  color: #1d4ed8;
  border-left-color: #93c5fd;
}
#miVista2 .sidebar-group-toggle-left {
  display: flex;
  align-items: center;
  gap: .5rem;
  min-width: 0;
}
#miVista2 .sidebar-group-chevron {
  font-size: .6rem;
  color: #94a3b8;
  flex-shrink: 0;
  transition: transform .22s ease;
}
#miVista2 .sidebar-group-toggle.open .sidebar-group-chevron { transform: rotate(90deg); }

/* ── Submenu ── */
#miVista2 .sidebar-submenu {
  max-height: 0;
  overflow: hidden;
  transition: max-height .28s cubic-bezier(.4,0,.2,1);
  padding-left: .6rem;
}
#miVista2 .sidebar-submenu.open { max-height: 700px; }
#miVista2 .sidebar-sublink {
  display: flex;
  align-items: center;
  gap: .45rem;
  padding: .32rem .55rem;
  margin: .06rem 0;
  border-radius: .45rem;
  font-size: .74rem;
  font-weight: 400;
  color: #64748b;
  text-decoration: none;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .13s, color .13s;
}
#miVista2 .sidebar-sublink:hover { background:#f1f5f9; color:#1e40af; text-decoration:none; }
#miVista2 .sidebar-sublink.active {
  background: #eff6ff;
  color: #1d4ed8;
  font-weight: 600;
  border-left-color: #60a5fa;
}

/* ── Backdrop móvil ── */
#miVista2 .sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.4);
  z-index: 1020;
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(1px);
}
#miVista2 .sidebar-backdrop.visible { display: block; }

/* ── Contenido principal ── */
#miVista2 #page-content-wrapper {
  margin-left: 13.5rem;
  transition: margin .28s cubic-bezier(.4,0,.2,1);
  padding: 56px .3rem .3rem;
  width: 100%;
}
#miVista2 #wrapper.toggled #sidebar-wrapper { left: -13.5rem; }
#miVista2 #wrapper.toggled #page-content-wrapper { margin-left: 0; }
#miVista2 #menu-toggle { cursor: pointer; }

/* Responsive móvil — sidebar oculto por defecto */
@media (max-width: 767px) {
  #miVista2 #sidebar-wrapper.sidebar-shell {
    width: 13.5rem;
    left: -13.5rem; /* oculto por defecto en móvil */
  }
  #miVista2 #page-content-wrapper { margin-left: 0; }
  /* Al abrir (quitar toggled) → sidebar visible */
  #miVista2 #wrapper:not(.toggled) #sidebar-wrapper { left: 0; }
  /* Al cerrar → vuelve a ocultarse */
  #miVista2 #wrapper.toggled #sidebar-wrapper { left: -13.5rem; }
}

/* Responsive escritorio */
@media (min-width: 768px) {
  #miVista2 #sidebar-wrapper.sidebar-shell { width: 13.5rem; }
  #miVista2 #page-content-wrapper { margin-left: 13.5rem; }
  #miVista2 #wrapper.toggled #page-content-wrapper { margin-left: 0; }
}
