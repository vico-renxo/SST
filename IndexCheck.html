<script>
// ✅ CACHE MANAGER
class CacheManagerCheck {
  static getWithExpiry(key, expiryHours = 12) {
    const item = localStorage.getItem(key);
    if (!item) return null;
    
    const data = JSON.parse(item);
    const now = new Date().getTime();
    
    if (now > data.timestamp + (expiryHours * 60 * 60 * 1000)) {
      localStorage.removeItem(key);
      return null;
    }
    
    return data.value;
  }
  
  static setWithExpiry(key, value, expiryHours = 12) {
    const data = {
      value: value,
      timestamp: new Date().getTime()
    };
    localStorage.setItem(key, JSON.stringify(data));
  }
  
  static getSessionWithExpiry(key, expiryMinutes = 30) {
    const item = sessionStorage.getItem(key);
    if (!item) return null;
    
    const data = JSON.parse(item);
    const now = new Date().getTime();
    
    if (now > data.timestamp + (expiryMinutes * 60 * 1000)) {
      sessionStorage.removeItem(key);
      return null;
    }
    
    return data.value;
  }
  
  static setSessionWithExpiry(key, value, expiryMinutes = 30) {
    const data = {
      value: value,
      timestamp: new Date().getTime()
    };
    sessionStorage.setItem(key, JSON.stringify(data));
  }
}

// ✅ VARIABLES GLOBALES OPTIMIZADAS
let offsetCheck = 0;
const limitCheck = 20;
let filtroMesCheck = "Todos"; // Por defecto muestra todo
let filtroEquipoCheck = "Todos";
let headersCheckG = [];
let itemsDataCheck = [];
let itemsMap = new Map();
let totalCoincidenciasCheck = 0;

// ✅ VARIABLES DE CONTROL - Agregadas las que faltaban
let searchTimeoutCheck;
let currentControllerCheck;
let isLoadingMoreCheck = false;
let currentSearchIdCheck = 0; // ✅ NUEVO: ID único para cada búsqueda
let pendingReplacementCheck = false; // ✅ NUEVO: Control de parpadeo

var cachedDataCheckList = []; 
let loginPasswords = [];
let deletePasswords = [];

// ✅ DEBOUNCE MEJORADO
function debounceSearchCheck(func, delay = 300) {
  return function executedFunction(...args) {
    clearTimeout(searchTimeoutCheck);
    
    // ✅ Cancelar petición anterior
    if (currentControllerCheck) {
      currentControllerCheck.abort();
    }
    
    searchTimeoutCheck = setTimeout(() => {
      func(...args);
    }, delay);
  };
}

// ✅ CARGAR PASSWORDS CON CACHE (sin cambios)
async function cargarPasswordsCheck() {
  const cached = CacheManagerCheck.getSessionWithExpiry('passwordsCheck', 60);
  if (cached) {
    loginPasswords = cached.loginPasswords;
    deletePasswords = cached.deletePasswords;
    return Promise.resolve();
  }

  return new Promise((resolve) => {
    google.script.run.withSuccessHandler((passwords) => {
      loginPasswords = passwords.loginPasswords;
      deletePasswords = passwords.deletePasswords;
      CacheManagerCheck.setSessionWithExpiry('passwordsCheck', passwords, 60);
      resolve();
    }).withFailureHandler(err => { resolve(); console && console.warn('Error cargando passwords:', err); }).getAccessPasswords();
  });
}

// ✅ INICIALIZACIÓN (sin cambios - está bien)
google.script.run.withSuccessHandler(data => {
  itemsDataCheck = data;

  itemsMap = data.reduce((map, row) => {
    const equipo = row[1];
    if (!map.has(equipo)) {
      map.set(equipo, []);
    }
    map.get(equipo).push(row);
    return map;
  }, new Map());

  google.script.run.withSuccessHandler(headersData => {
    headersCheckG = headersData;
    const sel1 = document.getElementById("columnaFiltroCheck1");
    const sel2 = document.getElementById("columnaFiltroCheck2");

    if (sel1 && sel2) {

          opt.value = col;
          opt.textContent = col;
          sel.appendChild(opt);
        });
      });

    cargarDatosCheckG();

  }).withFailureHandler(err => { Swal.fire({ icon:'error', title:'Error', text: err.message||'Error al cargar headers', toast:true, position:'top-end', timer:4000, showConfirmButton:false }); }).getHeadersCheck();

}).withFailureHandler(err => { Swal.fire({ icon:'error', title:'Error', text: err.message||'Error al cargar datos', toast:true, position:'top-end', timer:4000, showConfirmButton:false }); }).getItemsData();

// Cargar chips de equipo desde INVENTARIO col D
google.script.run.withSuccessHandler(function(equipos) {
  var box = document.getElementById('chipEquiposCheck');
  if (!box || !equipos || !equipos.length) return;
  equipos.forEach(function(eq) {
    var chip = document.createElement('span');
    chip.className = 'check-chip';
    chip.setAttribute('data-equipo', eq);
    chip.textContent = eq;
    box.appendChild(chip);

  });
  box.querySelectorAll('.check-chip').forEach(function(el) {
    el.addEventListener('click', function() {

      el.classList.add('active');
      filtroEquipoCheck = el.getAttribute('data-equipo');
      reiniciarTablaCheck();
    });

}).withFailureHandler(function(err) { /* chips opcionales, ignorar */ }).getEquiposCheck();

const camposChecklist = {
  ad9: 5,
  ad6: 6,
  ad5: 7,
  numid: 0,
  empresacheck: 1,     // Nuevo campo
  name: 2,
  codigo: 3,
  inps: 4,
  procesoCheck: 5,
  no: 6,
  lugarCheck: 7,
  idline: 9,
  accion: 8,
  imagen: 10,
  estadoCheck2: 12,
  plazoCheck: 13
};

function actualizarLabelsYPlaceholdersChecklist() {
  Object.entries(camposChecklist).forEach(([id, index]) => {
    const label = document.querySelector(`label[for="${id}"]`) ||
                  document.querySelector(`#${id}`)?.closest(".col-md-6, .col-12")?.querySelector("label");

    const input = document.getElementById(id);

    if (label && headersCheckG[index]) {
      label.textContent = headersCheckG[index];
    }

    if (input && headersCheckG[index] && input.tagName === "INPUT" && input.type !== "file") {
      input.placeholder = headersCheckG[index];
    }
  });
}

// ✅ EVENT LISTENERS
document.addEventListener('DOMContentLoaded', function() {
  const btncargarMasCheck = document.getElementById("cargarMasCheck");

  if (btncargarMasCheck) {
    btncargarMasCheck.addEventListener("click", (e) => {
      e.preventDefault();
      if (!isLoadingMoreCheck) cargarDatosCheckG();
    });
  }

  // Chips de mes — marcar "Todos" por defecto y escuchar clicks
  (function() {
    var boxMeses = document.getElementById('chipMesesCheck');
    if (!boxMeses) return;
    var chipTodos = boxMeses.querySelector('.check-chip[data-mes="Todos"]');
    if (chipTodos) chipTodos.classList.add('active');
    boxMeses.querySelectorAll('.check-chip').forEach(function(chip) {
      var mes = chip.getAttribute('data-mes');
      chip.addEventListener('click', function() {
        boxMeses.querySelectorAll('.check-chip').forEach(function(x) { x.classList.remove('active'); });
        chip.classList.add('active');
        filtroMesCheck = (mes === 'Todos') ? 'Todos' : parseInt(mes);
        reiniciarTablaCheck();
      });
    });
  })();

  // Cargar totales
  var totalCheck1 = document.getElementById('totalCheck1');
  var totalCheck2 = document.getElementById('totalCheck2');
  if (totalCheck1 && totalCheck2) {
    google.script.run.withSuccessHandler(function(data) {
      totalCheck2.innerHTML = data[0];
      totalCheck1.innerHTML = data[1];
    }).withFailureHandler(function() { /* totales opcionales */ }).setStatusCheck();
  }

  cargarPasswordsCheck();
  mostrarEstadoCargaCheck('skeleton', true);
});

function checkPasswordLocal(password) {
  return loginPasswords.includes(password);
}

function checkDeletePasswordLocal(password) {
  return deletePasswords.includes(password);
}

// ✅ CORREGIR: Reiniciar tabla sin parpadeo
function reiniciarTablaCheck() {
  currentSearchIdCheck++;
  const searchId = currentSearchIdCheck;
  
  if (currentControllerCheck) {
    currentControllerCheck.abort();
  }
  currentControllerCheck = new AbortController();

  offsetCheck = 0;
  cachedDataCheckList = [];
  isLoadingMoreCheck = false;
  pendingReplacementCheck = true;
  
  // ✅ MOSTRAR SKELETON para nueva búsqueda
  mostrarEstadoCargaCheck('skeleton', true);
  
  cargarDatosCheckG(searchId);
}

// ✅ CORREGIR: Cargar datos con validación de búsqueda
function cargarDatosCheckG(searchId = currentSearchIdCheck) {
  if (isLoadingMoreCheck) return;
  isLoadingMoreCheck = true;

  if (offsetCheck === 0) {
    mostrarEstadoCargaCheck('skeleton', true);
  } else {
    mostrarEstadoCargaCheck('spinner', true);
  }

  const btncargarMasCheck = document.getElementById("cargarMasCheck");
  if (btncargarMasCheck) btncargarMasCheck.disabled = true;

  google.script.run
    .withSuccessHandler((data) => {
      if (searchId !== currentSearchIdCheck) {
        isLoadingMoreCheck = false;
        return;
      }
      renderizarTablaCheck(data, searchId);
    })
    .withFailureHandler(err => {
      mostrarEstadoCargaCheck('', false);
      isLoadingMoreCheck = false;
      if (btncargarMasCheck) btncargarMasCheck.disabled = false;
      Swal.fire({ icon: 'error', title: 'Error', text: err.message || 'Error al cargar registros', toast: true, position: 'top-end', timer: 4000, showConfirmButton: false });
    })
    .getDatosRegistroCheck(offsetCheck, limitCheck, filtroMesCheck, filtroEquipoCheck);
}

// ✅ CORREGIR: Renderizar tabla con validación y sin parpadeo
function renderizarTablaCheck(respuesta, searchId = currentSearchIdCheck) {
  if (searchId !== currentSearchIdCheck) {
    isLoadingMoreCheck = false;
    return;
  }

  const contenedorCheck = document.getElementById("tabla-registro-checklist");
  const btncargarMasCheck = document.getElementById("cargarMasCheck");

  if (!respuesta || !respuesta.data || respuesta.data.length === 0) {
    if (offsetCheck === 0) {
      contenedorCheck.innerHTML = "<p>No se encontraron resultados.</p>";
      pendingReplacementCheck = false;
    }
    mostrarEstadoCargaCheck('', false);
    isLoadingMoreCheck = false;
    if (btncargarMasCheck) btncargarMasCheck.disabled = false;
    return;
  }

  // ✅ Si es nueva búsqueda (offset 0), REEMPLAZAR todo
  if (offsetCheck === 0 && pendingReplacementCheck) {
    contenedorCheck.innerHTML = "";
    cachedDataCheckList = respuesta;
    pendingReplacementCheck = false;
  }

  // ✅ OCULTAR loading después de procesar datos
  mostrarEstadoCargaCheck('', false);
  isLoadingMoreCheck = false;
  if (btncargarMasCheck) btncargarMasCheck.disabled = false;

  totalCoincidenciasCheck = respuesta.total;
  // Actualizar badge con total del mes seleccionado
  if (offsetCheck === 0) {
    var _badgeMes = document.getElementById("totalCheck2");
    if (_badgeMes) _badgeMes.textContent = respuesta.total;
  }

  const fragment = document.createDocumentFragment();
  const cardsRow = document.createElement("div");
  cardsRow.className = "row g-3 py-2";

  // ✅ RENDERIZAR DATOS NORMALMENTE
  respuesta.data.forEach(fila => {
    const complianceList = fila[14].split(',').map(c => c.trim());
    const items = itemsMap.get(fila[2]) || [];

    // ✅ CONTADOR MODIFICADO: Excluir títulos (NA de ítems que empiezan con número+punto)
    const { siCount, noCount, otrosCount } = complianceList.reduce((acc, v, i) => {
      const itemText = items[i] && items[i][2] ? items[i][2] : '';
      const esTitulo = /^\d+\./.test(itemText.trim()) && v === 'NA';
      if (esTitulo) return acc; // No contar títulos
      if (v === 'Si') acc.siCount++;
      else if (v === 'No') acc.noCount++;
      else acc.otrosCount++;
      return acc;
    }, { siCount: 0, noCount: 0, otrosCount: 0 });

    // ✅ GENERAR DETALLES CON TÍTULOS VISUALES + OBSERVACIONES
    const { texto: detallesTexto, html: detallesHTML, sectionTitles } = generarDetallesItems(complianceList, items);
    const observacionesHTML = generarObservacionesHTML(fila, sectionTitles);

    const mensajeWhatsApp = generarMensajeWhatsApp(fila, siCount, noCount, detallesTexto);
    const imagenPrincipal = (!fila[10] || fila[10].trim() === "" || fila[10] === "NA") ? "https://lh5.googleusercontent.com/d/1uU0A4gwDjF2X35ussSiTnuXbibK6lnGN" : fila[10];

    const cardHTML = `
  <div class='col-sm-6 col-md-4 col-lg-3'>
    <div class='tiktok-card' style='overflow: hidden; position: relative;'>
      
           ${(() => {
        const totalRespuestas = siCount + noCount;
        const cumplimiento = totalRespuestas > 0 ? Math.round((siCount / totalRespuestas) * 100) : 0;
        const estado = fila[12] || 'Sin estado';

        // Color del estado
        let colorEstado = '#6c757d'; // gris por defecto
        if (estado === 'Abierto') colorEstado = '#dc3545'; // rojo
        else if (estado === 'Cerrado') colorEstado = '#28a745'; // verde
        else if (estado === 'Conforme') colorEstado = '#ffc107'; // amarillo

        // Color dinámico según porcentaje
        let colorCumplimiento = '#dc3545'; // rojo por defecto
        if (cumplimiento >= 95) colorCumplimiento = '#28a745'; // verde
        else if (cumplimiento >= 80) colorCumplimiento = '#ffc107'; // amarillo

        return `
          <div style="position: absolute; top: 10px; left: 5px; z-index: 5; display: flex; gap: 6px; flex-wrap: wrap;">
            <div class="estado-badge" style="background-color:${colorEstado}; left: 55px;">${estado}</div>
            <div class="estado-badge" style="background-color:${colorCumplimiento}; color:#000;">
              ${cumplimiento}%
            </div>
          </div>`;
      })()}

      <img src='${imagenPrincipal}' loading="lazy" onclick='showImageCheckList("${imagenPrincipal}")'>
      <div class='overlay-buttons'>
        <div class="avatar-wrapper" onclick="toggleNombreUsuario(this)">
          ${(function(){
            // Usar Responsable de Área (fila[11]); si es "sin personal" o vacío, usar Inspector (fila[6])
            var nombreAvatar = (fila[11] === 'Área inspeccionada sin personal presente' || !fila[11])
              ? (fila[6] || '')
              : fila[11];
            var initials = (nombreAvatar).split(' ').map(p => p[0] || '').join('').substring(0, 3).toUpperCase();
            return '<div class="avatar-circle-only">' + initials + '</div>' +
                   '<div class="nombre-completo hidden-nombre">' + nombreAvatar + '</div>';
          })()}
        </div>
        <button onclick='checkPasswordAndEdit(${JSON.stringify(fila)})'><i class='fa-solid fa-screwdriver-wrench'></i></button>
        <button onclick='deleteData(${fila[0]}, this)'><i class='fa fa-trash'></i></button>
        <button onclick="sendWhatsApp('${mensajeWhatsApp}')"><i class="fa-brands fa-whatsapp"></i></button>
        <button class='exportPdfBtn' data-column-a='${fila[0]}' title="Exportar PDF"><i class="fa-solid fa-file-pdf"></i></button>
      </div>
      <div class='tiktok-text' style='max-height: 80%; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;'>
        <div style="font-size: 16px; font-weight: bold; color: white;">ID: ${fila[0]} – ${fila[2]}</div>
        <div><strong>${headersCheckG[7] || "Lugar"}:</strong> ${fila[7]}</div>
        <div>
          <b>Cumplimiento:</b>
          <i class="fa-solid fa-check" style="color:green;"></i> ${siCount} &nbsp;
          <i class="fa-solid fa-xmark" style="color:red;"></i> ${noCount} &nbsp;
          <i class="fa-solid fa-circle" style="color:blue;"></i> ${otrosCount}
        </div>
        <div id='extra-content-check-${fila[0]}' style='display: none; margin-top: 6px; font-size: 13px;'>
        <ul style="padding: 0; margin: 0;">
          <li><b>${headersCheckG[9] || "Fecha"}:</b> ${fila[9]}</li>
          <li><b>${headersCheckG[1] || "Empresa"}:</b> ${fila[1]}</li>
          <li><b>Responsable:</b> ${fila[11] || '-'}</li>
          <li><b>${headersCheckG[5] || "Proceso"}:</b> ${fila[5]}</li>
          <li><b>${headersCheckG[13] || "Frecuencia"}:</b> ${fila[13]}</li>
          <li><b>${headersCheckG[8] || "Plan"}:</b> ${fila[8]}</li>
          <li><b>${headersCheckG[4] || "Área"}:</b> ${fila[4]}</li>
        </ul>
          <hr class="my-1">
          <div class="mt-2">${detallesHTML}</div>
          ${observacionesHTML}
        </div>
        <div class='text-end mb-0'>
          <a href='#' class='text-info fw-bold' onclick='toggleExtraContentCheck("${fila[0]}", this); return false;'>Ver más</a>
        </div>
      </div>
    </div>
  </div>
`;

    const div = document.createElement("div");
    div.innerHTML = cardHTML;
    cardsRow.appendChild(div.firstElementChild);
  });

  // ✅ COMPLETAR FILA INCOMPLETA SI ES LA ÚLTIMA CARGA
  const esUltimaCarga = (offsetCheck + respuesta.data.length) >= totalCoincidenciasCheck;
  if (esUltimaCarga) {
    const totalElementosEnPantalla = respuesta.data.length;
    const elementosEnUltimaFila = totalElementosEnPantalla % 4;
    
    if (elementosEnUltimaFila > 0) {
      const placeholdersNecesarios = 4 - elementosEnUltimaFila;
      
      for (let i = 0; i < placeholdersNecesarios; i++) {
        const placeholder = document.createElement('div');
        placeholder.className = 'col-sm-6 col-md-4 col-lg-3';
        placeholder.innerHTML = '<div style="height: 1px; visibility: hidden;"></div>';
        cardsRow.appendChild(placeholder);
      }
    }
  }

  fragment.appendChild(cardsRow);
  contenedorCheck.appendChild(fragment);
  
  offsetCheck += limitCheck;
  
  // ✅ Actualizar botón cargar más
  if (btncargarMasCheck) {
    const hayMasDatos = offsetCheck < totalCoincidenciasCheck;
    
    if (hayMasDatos) {
      btncargarMasCheck.style.display = "block";
      btncargarMasCheck.disabled = false;
      btncargarMasCheck.innerHTML = `Cargar más (${offsetCheck}/${totalCoincidenciasCheck})`;
    } else {
      btncargarMasCheck.style.display = "none";
    }
  }
}

// ✅ MOSTRAR CARGA MEJORADA (sin modificar DOM hasta tener datos)
function mostrarEstadoCargaCheck(tipo, mostrar = true) {
  const skeleton = document.getElementById('skeleton-loading2');
  const spinner = document.getElementById('spinnerCheck');
  const container = document.getElementById("tabla-registro-checklist");
  
  if (tipo === 'skeleton' && mostrar) {
    // Mostrar skeleton al inicio de búsqueda
    skeleton?.classList.remove('d-none');
    spinner?.style.setProperty('display', 'none');
    if (container) {
      container.style.opacity = "0.6";
      container.style.pointerEvents = "none";
    }
  } else if (tipo === 'spinner' && mostrar) {
    // Mostrar spinner para carga adicional (scroll infinito)
    skeleton?.classList.add('d-none');
    spinner?.style.setProperty('display', 'block');
    if (container) {
      container.style.opacity = "0.6";
      container.style.pointerEvents = "none";
    }
  } else {
    // Ocultar todo
    skeleton?.classList.add('d-none');
    spinner?.style.setProperty('display', 'none');
    if (container) {
      container.style.opacity = "1";
      container.style.pointerEvents = "auto";
    }
  }
}

// ✅ MODIFICADO: Títulos con fondo azul, sin numeración, sin contar
function generarDetallesItems(complianceList, items) {
  let texto = '', html = '';
  let itemCounter = 0;
  let sectionTitles = [];

  complianceList.forEach((valor, i) => {
    const itemText = items[i] && items[i][2] ? items[i][2] : '';
    const esTitulo = /^\d+\./.test(itemText.trim()) && valor === 'NA';

    if (esTitulo) {
      // ✅ TÍTULO: fondo azul, letra blanca, sin número, no se cuenta
      sectionTitles.push(itemText.replace(/^\d+\.\s*/, '').trim());
      html += `<div style="background-color:#2c5aa0; color:#fff; font-weight:bold; padding:3px 8px; border-radius:3px; margin:5px 0 2px 0; text-align:center; font-size:0.82em;">
        <i class="fa-solid fa-list-check me-1"></i>${itemText}
      </div>`;
      texto += `── ${itemText} ──\n`;
    } else {
      // ✅ ÍTEM NORMAL: se cuenta secuencialmente
      itemCounter++;
      if (valor === 'No') {
        texto += `X ${itemCounter}. ${itemText}\n`;
        html += `<div class="small" style="color:#ff81b4;"><b><i class="fa-solid fa-square-xmark"></i></b> ${itemCounter}. ${itemText}</div>`;
      } else if (valor === 'Si') {
        texto += `✓ ${itemCounter}. ${itemText}\n`;
        html += `<div class="small" style="color:#81ff8a;"><b><i class="fa-solid fa-square-check"></i></b> ${itemCounter}. ${itemText}</div>`;
      } else {
        texto += `O ${itemCounter}. ${itemText}\n`;
        html += `<div class="small" style="color:#83c1ff;"><i class="fa-regular fa-square-full"></i> ${itemCounter}. ${itemText}</div>`;
      }
    }
  });

  return { texto, html, sectionTitles };
}

// ✅ NUEVA FUNCIÓN: Generar HTML de observaciones por sección
// Helper local: parsear celda codificada "num::url~~num::url" o URL directa
function parseObsCellCard(cellValue) {
  if (!cellValue) return [];
  var s = String(cellValue).trim();
  if (!s) return [];
  if (!s.includes('::')) return [{ num: '', value: s }];
  return s.split('~~').filter(Boolean).map(function(part) {
    var si = part.indexOf('::');
    if (si === -1) return { num: '', value: part };
    return { num: part.substring(0, si), value: part.substring(si + 2) };
  });
}

function generarObservacionesHTML(fila, sectionTitles) {
  let html = '';
  let hasObs = false;

  for (let s = 0; s < 10; s++) {
    var fotoRaw       = (fila[68 + s * 3] || '').trim();
    var subRaw        = (fila[69 + s * 3] || '').trim();
    var comentarioRaw = (fila[70 + s * 3] || '').trim();

    if (!fotoRaw && !comentarioRaw) continue;

    if (!hasObs) {
      html += `<hr class="my-2" style="border-color:rgba(255,255,255,0.15);">
        <div style="font-weight:bold; color:#ff9800; margin:4px 0; font-size:0.9em;">
          <i class="fa-solid fa-clipboard-list me-1"></i>OBSERVACIONES
        </div>`;
      hasObs = true;
    }

    var titulo = sectionTitles[s] || ('Sección ' + (s + 1));

    // Parsear celdas codificadas
    var fotoItems    = parseObsCellCard(fotoRaw);
    var subItems     = parseObsCellCard(subRaw);
    var comentItems  = parseObsCellCard(comentarioRaw);

    var subByNum     = {};
    subItems.forEach(function(i) { subByNum[i.num] = i.value; });
    var comentByNum  = {};
    comentItems.forEach(function(i) { comentByNum[i.num] = i.value; });

    // Determinar si toda la sección está subsanada o en gestión
    const obsCount  = fotoItems.filter(i => i.value).length;
    const grCount   = fotoItems.filter(i => i.value && subByNum[i.num] === 'EN_GESTION').length;
    const realSub   = fotoItems.filter(i => i.value && subByNum[i.num] && subByNum[i.num] !== 'EN_GESTION').length;
    const subCount  = grCount + realSub;
    const secSubsanada  = obsCount > 0 && realSub >= obsCount;
    const secEnGestion  = !secSubsanada && obsCount > 0 && subCount >= obsCount && grCount > 0;

    var borderColor = secSubsanada ? '#28a745' : (secEnGestion ? '#6c757d' : '#ff9800');
    html += `<div style="margin:4px 0; padding:5px 8px; background:rgba(255,255,255,0.06); border-radius:4px; border-left:3px solid ${borderColor};">`;
    html += `<div style="font-weight:bold; font-size:0.82em; color:#ffcc80;">▸ ${titulo}`;
    if (secSubsanada) {
      html += ` <span style="font-size:0.7em; background:#28a745; color:#fff; padding:1px 5px; border-radius:3px; margin-left:4px;">✓ Subsanada</span>`;
    } else if (secEnGestion) {
      html += ` <span style="font-size:0.7em; background:#6c757d; color:#fff; padding:1px 5px; border-radius:3px; margin-left:4px;"><i class="fa-solid fa-clock-rotate-left"></i> En Gestión del Responsable</span>`;
    } else {
      html += ` <span style="font-size:0.7em; background:#ff9800; color:#fff; padding:1px 5px; border-radius:3px; margin-left:4px;">Pendiente</span>`;
    }
    html += `</div>`;

    // Per-ítem: comentario + fotos
    const itemNums = new Set([
      ...fotoItems.filter(i => i.value).map(i => i.num),
      ...comentItems.filter(i => i.value).map(i => i.num)
    ]);

    itemNums.forEach(function(num) {
      var fotoUrl  = (fotoItems.find(i => i.num === num) || {}).value || '';
      var subUrl   = subByNum[num] || '';
      var coment   = comentByNum[num] || '';

      if (num) {
        html += `<div style="font-size:0.78em; color:#ccc; margin:2px 0; font-weight:bold;">Ítem ${num}</div>`;
      }
      if (coment) {
        html += `<div style="font-size:0.78em; color:#ddd; margin:2px 0;"><i class="fa-regular fa-comment me-1"></i>${coment}</div>`;
      }

      html += `<div style="display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; margin:3px 0;">`;
      if (fotoUrl) {
        html += `<div>
          <div style="font-size:0.65em; color:#aaa;">Original:</div>
          <div onclick='showImageCheckList("${fotoUrl}")'
            style="width:56px; height:56px; background-image:url(${fotoUrl}); background-size:cover; background-position:center;
            border-radius:4px; border:1px solid rgba(255,255,255,0.3); cursor:pointer; display:inline-block; position:relative;"
            title="Tap para ampliar"><i class="fa-solid fa-expand" style="position:absolute; bottom:2px; right:2px; font-size:8px; color:rgba(255,255,255,0.7);"></i></div>
        </div>`;
      }
      if (subUrl === 'EN_GESTION') {
        html += `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center;
          width:56px; height:56px; background:rgba(108,117,125,0.25); border-radius:4px;
          border:2px solid #6c757d; text-align:center; padding:2px;">
          <i class="fa-solid fa-clock-rotate-left" style="font-size:14px; color:#adb5bd; margin-bottom:2px;"></i>
          <span style="font-size:0.5em; color:#adb5bd; line-height:1.1;">En Gestión del Responsable</span>
        </div>`;
      } else if (subUrl) {
        html += `<div>
          <div style="font-size:0.65em; color:#8f8;">Subsanación:</div>
          <div onclick='showImageCheckList("${subUrl}")'
            style="width:56px; height:56px; background-image:url(${subUrl}); background-size:cover; background-position:center;
            border-radius:4px; border:2px solid #28a745; cursor:pointer; display:inline-block; position:relative;"
            title="Tap para ampliar"><i class="fa-solid fa-expand" style="position:absolute; bottom:2px; right:2px; font-size:8px; color:rgba(255,255,255,0.7);"></i></div>
        </div>`;
      }
      html += `</div>`;
    });

    html += `</div>`;
  }

  return html;
}
